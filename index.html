<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DeepSeek 智能助手 · 联网搜索</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            height: 100vh;
            overflow: hidden;
        }
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
        }
        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: rgba(20, 20, 35, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
            z-index: 20;
        }
        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .new-chat-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .session-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            margin-bottom: 4px;
            border-radius: 10px;
            cursor: pointer;
            color: #e0e0e0;
        }
        .session-item:hover { background: rgba(255, 255, 255, 0.08); }
        .session-item.active { background: rgba(139, 92, 246, 0.25); color: white; }
        .session-name {
            flex: 1;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .session-actions {
            display: flex;
            gap: 6px;
            opacity: 0;
        }
        .session-item:hover .session-actions { opacity: 1; }
        .session-action {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 4px;
            border-radius: 6px;
        }
        /* 主区域 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
        }
        .chat-header {
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chat-header h1 { font-size: 1.2rem; color: white; display: flex; align-items: center; gap: 8px; }
        .menu-toggle { display: none; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        .api-status { font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; background: rgba(0,0,0,0.5); }
        .settings-panel {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            font-size: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .settings-panel input[type="password"] {
            padding: 6px 10px;
            border-radius: 20px;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            width: 180px;
        }
        .temp-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 12px;
            border-radius: 24px;
        }
        .temp-control input { width: 100px; cursor: pointer; }
        .temp-value { min-width: 35px; text-align: center; background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 20px; }
        .think-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(139, 92, 246, 0.2);
            padding: 4px 12px;
            border-radius: 24px;
            cursor: pointer;
        }
        .think-toggle.active { background: rgba(139, 92, 246, 0.5); }
        .toggle-switch {
            width: 32px;
            height: 18px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 18px;
            position: relative;
        }
        .toggle-switch::after {
            content: "";
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }
        .think-toggle.active .toggle-switch::after { transform: translateX(14px); }
        /* 联网搜索样式 */
        .search-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(34, 197, 94, 0.2);
            padding: 4px 12px;
            border-radius: 24px;
            cursor: pointer;
        }
        .search-toggle.active { background: rgba(34, 197, 94, 0.5); }
        .search-toggle .toggle-switch {
            background: rgba(255, 255, 255, 0.3);
        }
        .search-toggle.active .toggle-switch::after {
            transform: translateX(14px);
        }
        /* Tavily 设置 */
        .tavily-setting {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 12px;
            border-radius: 24px;
        }
        .tavily-setting input {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            border-radius: 16px;
            padding: 4px 8px;
            color: white;
            width: 160px;
            font-size: 0.7rem;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        /* 消息卡片样式 */
        .message-card {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.2s ease;
        }
        .message-card.user { flex-direction: row-reverse; }
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .user .message-avatar { background: #3b82f6; }
        .assistant .message-avatar { background: #8b5cf6; }
        .message-body {
            max-width: 75%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .bubble {
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.5;
            font-size: 0.95rem;
        }
        .user .bubble {
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .assistant .bubble {
            background: rgba(255, 255, 255, 0.1);
            color: #e5e5e5;
            border-bottom-left-radius: 4px;
        }
        .bubble.markdown-body {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
        }
        .bubble.markdown-body p { margin: 0.5em 0; }
        .bubble.markdown-body p:first-child { margin-top: 0; }
        .bubble.markdown-body p:last-child { margin-bottom: 0; }
        .bubble.markdown-body code {
            background: rgba(0,0,0,0.3);
            padding: 2px 5px;
            border-radius: 6px;
            font-family: monospace;
        }
        .bubble.markdown-body pre {
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
        }
        .bubble.markdown-body pre code { background: none; padding: 0; }
        /* 引用来源样式 */
        .sources {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 0.75rem;
        }
        .sources a {
            color: #a78bfa;
            text-decoration: none;
            display: inline-block;
            margin-right: 12px;
            margin-bottom: 4px;
        }
        .sources a:hover {
            text-decoration: underline;
        }
        /* 思考过程样式 */
        .reasoning-container {
            background: rgba(139, 92, 246, 0.15);
            border-left: 3px solid #8b5cf6;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .reasoning-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #a78bfa;
        }
        .reasoning-content {
            padding: 12px 14px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            white-space: pre-wrap;
            border-top: 1px solid rgba(139, 92, 246, 0.2);
        }
        .reasoning-content.hidden { display: none; }
        /* 消息工具栏 */
        .message-toolbar {
            display: flex;
            gap: 12px;
            margin-top: 4px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .message-card:hover .message-toolbar { opacity: 1; }
        .tool-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.7rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 16px;
        }
        .tool-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        .version-switcher {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
            font-size: 0.7rem;
        }
        .version-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #ccc;
            padding: 3px 8px;
            border-radius: 16px;
            cursor: pointer;
        }
        .version-btn.active {
            background: #8b5cf6;
            color: white;
        }
        .input-area {
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 12px;
        }
        .input-area textarea {
            flex: 1;
            padding: 12px 18px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 0.95rem;
            font-family: inherit;
            resize: vertical;
            outline: none;
            min-height: 44px;
            max-height: 150px;
        }
        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border: none;
            border-radius: 28px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 700px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                transform: translateX(-100%);
                box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            }
            .sidebar.open { transform: translateX(0); }
            .menu-toggle { display: block; }
            .message-body { max-width: 85%; }
        }
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            width: fit-content;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #a78bfa;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        @keyframes bounce {
            0%,60%,100%{ transform: translateY(0); }
            30%{ transform: translateY(-10px); }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn">➕ 新建对话</button>
        </div>
        <div class="sessions-list" id="sessionsList"></div>
    </div>
    <div class="main">
        <div class="chat-header">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <h1>DeepSeek 智能助手 · 联网搜索</h1>
            <div class="api-status" id="apiStatus">⚙️ 配置 Key</div>
        </div>
        <div class="settings-panel">
            <label>🔑 DeepSeek API Key:</label>
            <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxx">
            <div class="temp-control">
                <span>🌡️ 温度</span>
                <input type="range" id="tempSlider" min="0" max="2" step="0.1" value="1.5">
                <span class="temp-value" id="tempValue">1.5</span>
            </div>
            <div class="think-toggle" id="thinkToggle">
                <span>🧠 深度思考</span>
                <div class="toggle-switch"></div>
            </div>
            <div class="search-toggle" id="searchToggle">
                <span>🌐 联网搜索</span>
                <div class="toggle-switch"></div>
            </div>
        </div>
        <div class="settings-panel" style="border-top: none; border-bottom: 1px solid rgba(255, 255, 255, 0.05);">
            <div class="tavily-setting">
                <span>🔍 Tavily API Key:</span>
                <input type="password" id="tavilyKeyInput" placeholder="tvly-xxxxxxxx">
                <span style="font-size: 0.65rem; color: rgba(255,255,255,0.5);">(免费额度 1000次/月)</span>
            </div>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="input-area">
            <textarea id="messageInput" rows="1" placeholder="输入消息... (Shift+Enter换行，Enter发送)"></textarea>
            <button id="sendBtn">发送</button>
        </div>
    </div>
</div>

<script>
    // ---------- 数据结构 ----------
    let sessions = [];
    let currentSessionId = null;
    let isWaiting = false;
    let isReasoningMode = false;
    let isSearchMode = false;

    // DOM
    const sidebar = document.getElementById('sidebar');
    const menuToggle = document.getElementById('menuToggle');
    const sessionsList = document.getElementById('sessionsList');
    const newChatBtn = document.getElementById('newChatBtn');
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const tavilyKeyInput = document.getElementById('tavilyKeyInput');
    const apiStatus = document.getElementById('apiStatus');
    const tempSlider = document.getElementById('tempSlider');
    const tempValue = document.getElementById('tempValue');
    const thinkToggle = document.getElementById('thinkToggle');
    const searchToggle = document.getElementById('searchToggle');

    function generateId() {
        return Date.now() + '-' + Math.random().toString(36).substr(2, 8);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderMarkdown(text) {
        if (!text) return '';
        return marked.parse(text, { breaks: true, gfm: true });
    }

    // 存储
    function loadData() {
        const stored = localStorage.getItem('deepseek_branch_sessions');
        if (stored) {
            sessions = JSON.parse(stored);
        } else {
            sessions = [{
                id: generateId(),
                name: '新对话',
                messages: []
            }];
        }
        const storedCurrent = localStorage.getItem('deepseek_branch_current');
        if (storedCurrent && sessions.find(s => s.id === storedCurrent)) {
            currentSessionId = storedCurrent;
        } else {
            currentSessionId = sessions[0].id;
        }
        const savedKey = localStorage.getItem('deepseek_api_key');
        if (savedKey) apiKeyInput.value = savedKey;
        const savedTavilyKey = localStorage.getItem('tavily_api_key');
        if (savedTavilyKey) tavilyKeyInput.value = savedTavilyKey;
        const savedTemp = localStorage.getItem('deepseek_temperature');
        if (savedTemp) {
            tempSlider.value = savedTemp;
            tempValue.textContent = parseFloat(savedTemp).toFixed(1);
        }
        const savedReason = localStorage.getItem('deepseek_reasoning_mode');
        isReasoningMode = savedReason === 'true';
        if (isReasoningMode) thinkToggle.classList.add('active');
        else thinkToggle.classList.remove('active');
        const savedSearch = localStorage.getItem('deepseek_search_mode');
        isSearchMode = savedSearch === 'true';
        if (isSearchMode) searchToggle.classList.add('active');
        else searchToggle.classList.remove('active');
        updateApiStatus(apiKeyInput.value.trim());
    }

    function saveSessions() {
        localStorage.setItem('deepseek_branch_sessions', JSON.stringify(sessions));
        localStorage.setItem('deepseek_branch_current', currentSessionId);
    }

    function saveSettings() {
        localStorage.setItem('deepseek_api_key', apiKeyInput.value.trim());
        localStorage.setItem('tavily_api_key', tavilyKeyInput.value.trim());
        localStorage.setItem('deepseek_temperature', tempSlider.value);
        localStorage.setItem('deepseek_reasoning_mode', isReasoningMode);
        localStorage.setItem('deepseek_search_mode', isSearchMode);
    }

    function updateApiStatus(key) {
        if (key && key.startsWith('sk-')) {
            apiStatus.textContent = '✅ DeepSeek API Key 已配置';
            apiStatus.style.background = '#10b981';
        } else {
            apiStatus.textContent = '⚠️ 请输入 DeepSeek API Key';
            apiStatus.style.background = '#ef4444';
        }
    }

    // 会话管理
    function renderSessions() {
        sessionsList.innerHTML = '';
        sessions.forEach(session => {
            const div = document.createElement('div');
            div.className = `session-item ${session.id === currentSessionId ? 'active' : ''}`;
            div.innerHTML = `
                <span class="session-name" data-id="${session.id}">${escapeHtml(session.name)}</span>
                <div class="session-actions">
                    <button class="session-action rename" data-id="${session.id}" title="重命名">✏️</button>
                    <button class="session-action delete" data-id="${session.id}" title="删除">🗑️</button>
                </div>
            `;
            div.querySelector('.session-name').addEventListener('click', () => switchSession(session.id));
            div.querySelector('.rename').addEventListener('click', (e) => {
                e.stopPropagation();
                renameSession(session.id);
            });
            div.querySelector('.delete').addEventListener('click', (e) => {
                e.stopPropagation();
                deleteSession(session.id);
            });
            sessionsList.appendChild(div);
        });
    }

    function switchSession(sessionId) {
        if (sessionId === currentSessionId) return;
        currentSessionId = sessionId;
        saveSessions();
        renderSessions();
        renderMessages();
    }

    function renameSession(sessionId) {
        const session = sessions.find(s => s.id === sessionId);
        if (!session) return;
        const newName = prompt('请输入新名称', session.name);
        if (newName && newName.trim()) {
            session.name = newName.trim().substring(0, 30);
            saveSessions();
            renderSessions();
        }
    }

    function deleteSession(sessionId) {
        if (sessions.length === 1) {
            alert('至少保留一个对话');
            return;
        }
        if (confirm('删除后无法恢复，确定吗？')) {
            sessions = sessions.filter(s => s.id !== sessionId);
            if (currentSessionId === sessionId) {
                currentSessionId = sessions[0].id;
            }
            saveSessions();
            renderSessions();
            renderMessages();
        }
    }

    function newSession() {
        const newId = generateId();
        sessions.push({
            id: newId,
            name: `新对话 ${sessions.length + 1}`,
            messages: []
        });
        currentSessionId = newId;
        saveSessions();
        renderSessions();
        renderMessages();
    }

    function getCurrentSession() {
        return sessions.find(s => s.id === currentSessionId);
    }

    // ---------- Tavily 搜索 ----------
    async function performTavilySearch(query) {
        const tavilyKey = tavilyKeyInput.value.trim();
        if (!tavilyKey) {
            throw new Error('未配置 Tavily API Key，请在设置中填入后重试');
        }
        if (!tavilyKey.startsWith('tvly-')) {
            throw new Error('Tavily API Key 格式错误，应以 tvly- 开头');
        }
        
        const response = await fetch('https://api.tavily.com/search', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                api_key: tavilyKey,
                query: query,
                search_depth: 'basic',
                include_answer: true,
                include_raw_content: false,
                max_results: 5
            })
        });
        
        if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.error || `Tavily API 请求失败 (${response.status})`);
        }
        
        const data = await response.json();
        return {
            answer: data.answer,
            results: data.results || []
        };
    }

    // 判断是否需要联网搜索
    function shouldUseWebSearch(userQuery) {
        if (!isSearchMode) return false;
        // 联网搜索关键词判断
        const searchKeywords = [
            '天气', '新闻', '最新', '今天', '现在', '实时', '行情', '股票', '价格',
            '汇率', '比赛', '结果', '更新', '2025', '2026', '发生', '事件',
            '百度', '谷歌', '搜索', '查询', '查一下', '上网查', '网上找', '看看',
            'weather', 'news', 'latest', 'today', 'price', 'stock', 'exchange rate'
        ];
        const lowerQuery = userQuery.toLowerCase();
        return searchKeywords.some(keyword => lowerQuery.includes(keyword));
    }

    // 分支编辑：复制会话并修改
    async function editUserMessageWithBranch(msgIndex, newContent) {
        const oldSession = getCurrentSession();
        if (!oldSession) return;
        const newId = generateId();
        const newName = oldSession.name + ' - 分支';
        const newMessages = oldSession.messages.slice(0, msgIndex + 1);
        newMessages[msgIndex].content = newContent;
        const newSession = {
            id: newId,
            name: newName,
            messages: newMessages
        };
        sessions.push(newSession);
        currentSessionId = newId;
        saveSessions();
        renderSessions();
        await generateResponseForLastUserInSession(newSession);
    }

    async function generateResponseForLastUserInSession(session) {
        const userMessages = session.messages.filter(m => m.role === 'user');
        if (userMessages.length === 0) return;
        const lastUserMsg = userMessages[userMessages.length-1];
        const lastUserContent = lastUserMsg.content;
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) { alert('请先输入 DeepSeek API Key'); return; }
        
        isWaiting = true;
        sendBtn.disabled = true;
        messageInput.disabled = true;
        showTypingIndicator();
        
        try {
            const temperature = parseFloat(tempSlider.value);
            const model = isReasoningMode ? 'deepseek-reasoner' : 'deepseek-chat';
            
            // 判断是否需要联网搜索
            let searchResult = null;
            let systemPrompt = '';
            let finalUserContent = lastUserContent;
            
            if (shouldUseWebSearch(lastUserContent)) {
                const tavilyKey = tavilyKeyInput.value.trim();
                if (tavilyKey && tavilyKey.startsWith('tvly-')) {
                    try {
                        searchResult = await performTavilySearch(lastUserContent);
                        if (searchResult && (searchResult.answer || searchResult.results.length > 0)) {
                            systemPrompt = `你是一个智能助手，以下是来自互联网的实时搜索结果，请基于这些信息回答用户的问题。如果搜索结果中有相关链接，请在回答后以清晰的列表形式附上引用来源。\n\n=== 搜索结果 ===\n${searchResult.answer ? `搜索摘要：${searchResult.answer}\n\n` : ''}${searchResult.results.map((r, i) => `${i+1}. ${r.title}\n   ${r.content}\n   来源: ${r.url}`).join('\n\n')}\n=== 搜索结果结束 ===\n\n请基于以上搜索结果回答用户的问题，并注明信息来源。`;
                            finalUserContent = lastUserContent;
                        }
                    } catch (searchError) {
                        console.warn('搜索失败:', searchError);
                    }
                }
            }
            
            // 构建消息列表
            let apiMessages = [];
            if (systemPrompt) {
                apiMessages.push({ role: 'system', content: systemPrompt });
            }
            // 添加历史消息（排除系统消息，避免重复）
            for (const msg of session.messages) {
                if (msg.role === 'user') {
                    apiMessages.push({ role: msg.role, content: msg.content });
                } else if (msg.role === 'assistant') {
                    apiMessages.push({ role: msg.role, content: msg.content });
                }
            }
            // 最后一条用户消息可能已包含系统提示中，确保不重复
            if (apiMessages.length > 0 && apiMessages[apiMessages.length-1].role === 'user') {
                apiMessages[apiMessages.length-1].content = finalUserContent;
            }
            
            const payload = {
                model: model,
                messages: apiMessages,
                temperature: temperature,
                max_tokens: 4096,
                stream: false
            };
            
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify(payload)
            });
            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.error?.message || `请求失败 ${response.status}`);
            }
            const data = await response.json();
            const assistantMsg = data.choices[0].message;
            let content = assistantMsg.content;
            const reasoning = assistantMsg.reasoning_content || null;
            
            // 构建带来源的 HTML
            let sourcesHtml = '';
            if (searchResult && searchResult.results && searchResult.results.length > 0) {
                sourcesHtml = '<div class="sources"><strong>📎 引用来源：</strong><br>' + 
                    searchResult.results.map(r => `<a href="${r.url}" target="_blank" rel="noopener noreferrer">${r.title}</a>`).join(' ') + 
                    '</div>';
            }
            
            session.messages.push({
                role: 'assistant',
                content: content,
                reasoning: reasoning,
                versions: null,
                versionIndex: 0,
                sources: sourcesHtml
            });
            saveSessions();
            hideTypingIndicator();
            renderMessages();
        } catch (error) {
            hideTypingIndicator();
            session.messages.push({
                role: 'assistant',
                content: `❌ 错误：${error.message}`,
                reasoning: null
            });
            saveSessions();
            renderMessages();
        } finally {
            isWaiting = false;
            sendBtn.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
        }
    }

    // 发送新消息
    async function sendMessage() {
        const userInput = messageInput.value.trim();
        if (!userInput) return;
        if (isWaiting) return;
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) {
            alert('请先输入 DeepSeek API Key');
            return;
        }
        const session = getCurrentSession();
        if (!session) return;
        session.messages.push({ role: 'user', content: userInput });
        saveSessions();
        renderMessages();
        messageInput.value = '';
        messageInput.style.height = 'auto';
        await generateResponseForLastUserInSession(session);
    }

    // 重新生成（多版本）
    async function regenerateAssistant(msgIndex) {
        const session = getCurrentSession();
        if (!session) return;
        const msg = session.messages[msgIndex];
        if (!msg || msg.role !== 'assistant') return;
        let userMsgIndex = msgIndex - 1;
        while (userMsgIndex >= 0 && session.messages[userMsgIndex].role !== 'user') userMsgIndex--;
        if (userMsgIndex < 0) return;
        const userMsg = session.messages[userMsgIndex];
        const truncatedHistory = session.messages.slice(0, userMsgIndex + 1);
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) { alert('请先输入 DeepSeek API Key'); return; }
        isWaiting = true;
        sendBtn.disabled = true;
        showTypingIndicator();
        try {
            const temperature = parseFloat(tempSlider.value);
            const model = isReasoningMode ? 'deepseek-reasoner' : 'deepseek-chat';
            
            // 判断是否需要联网搜索
            let searchResult = null;
            let systemPrompt = '';
            let finalUserContent = userMsg.content;
            
            if (shouldUseWebSearch(userMsg.content)) {
                const tavilyKey = tavilyKeyInput.value.trim();
                if (tavilyKey && tavilyKey.startsWith('tvly-')) {
                    try {
                        searchResult = await performTavilySearch(userMsg.content);
                        if (searchResult && (searchResult.answer || searchResult.results.length > 0)) {
                            systemPrompt = `你是一个智能助手，以下是来自互联网的实时搜索结果，请基于这些信息回答用户的问题。如果搜索结果中有相关链接，请在回答后以清晰的列表形式附上引用来源。\n\n=== 搜索结果 ===\n${searchResult.answer ? `搜索摘要：${searchResult.answer}\n\n` : ''}${searchResult.results.map((r, i) => `${i+1}. ${r.title}\n   ${r.content}\n   来源: ${r.url}`).join('\n\n')}\n=== 搜索结果结束 ===\n\n请基于以上搜索结果回答用户的问题，并注明信息来源。`;
                            finalUserContent = userMsg.content;
                        }
                    } catch (searchError) {
                        console.warn('搜索失败:', searchError);
                    }
                }
            }
            
            let apiMessages = [];
            if (systemPrompt) {
                apiMessages.push({ role: 'system', content: systemPrompt });
            }
            for (const m of truncatedHistory) {
                if (m.role === 'user') {
                    apiMessages.push({ role: 'user', content: m.content });
                } else if (m.role === 'assistant') {
                    apiMessages.push({ role: 'assistant', content: m.content });
                }
            }
            if (apiMessages.length > 0 && apiMessages[apiMessages.length-1].role === 'user') {
                apiMessages[apiMessages.length-1].content = finalUserContent;
            }
            
            const payload = {
                model: model,
                messages: apiMessages,
                temperature: temperature,
                max_tokens: 4096,
                stream: false
            };
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify(payload)
            });
            if (!response.ok) throw new Error('API 请求失败');
            const data = await response.json();
            const newContent = data.choices[0].message.content;
            const newReasoning = data.choices[0].message.reasoning_content || null;
            
            let sourcesHtml = '';
            if (searchResult && searchResult.results && searchResult.results.length > 0) {
                sourcesHtml = '<div class="sources"><strong>📎 引用来源：</strong><br>' + 
                    searchResult.results.map(r => `<a href="${r.url}" target="_blank" rel="noopener noreferrer">${r.title}</a>`).join(' ') + 
                    '</div>';
            }
            
            if (!msg.versions) {
                msg.versions = [{ content: msg.content, reasoning: msg.reasoning, sources: msg.sources }];
            }
            msg.versions.push({ content: newContent, reasoning: newReasoning, sources: sourcesHtml });
            msg.versionIndex = msg.versions.length - 1;
            msg.content = newContent;
            msg.reasoning = newReasoning;
            msg.sources = sourcesHtml;
            saveSessions();
            hideTypingIndicator();
            renderMessages();
        } catch (error) {
            hideTypingIndicator();
            alert('重新生成失败：' + error.message);
        } finally {
            isWaiting = false;
            sendBtn.disabled = false;
        }
    }

    function switchVersion(msgIndex, versionIdx) {
        const session = getCurrentSession();
        if (!session) return;
        const msg = session.messages[msgIndex];
        if (!msg || !msg.versions) return;
        msg.versionIndex = versionIdx;
        msg.content = msg.versions[versionIdx].content;
        msg.reasoning = msg.versions[versionIdx].reasoning;
        msg.sources = msg.versions[versionIdx].sources;
        saveSessions();
        renderMessages();
    }

    // 渲染消息
    function renderMessages() {
        const session = getCurrentSession();
        if (!session) return;
        messagesArea.innerHTML = '';
        for (let i = 0; i < session.messages.length; i++) {
            const msg = session.messages[i];
            if (msg.role === 'user') {
                renderUserMessage(msg.content, i);
            } else {
                renderAssistantMessage(msg, i);
            }
        }
        scrollToBottom();
    }

    function renderUserMessage(content, index) {
        const card = document.createElement('div');
        card.className = 'message-card user';
        card.innerHTML = `
            <div class="message-avatar">👤</div>
            <div class="message-body">
                <div class="bubble">${escapeHtml(content)}</div>
                <div class="message-toolbar">
                    <button class="tool-btn edit-msg" data-index="${index}">✏️ 编辑（创建分支）</button>
                </div>
            </div>
        `;
        card.querySelector('.edit-msg').addEventListener('click', async () => {
            const newContent = prompt('修改消息内容（将创建新分支）：', content);
            if (newContent && newContent.trim()) {
                await editUserMessageWithBranch(index, newContent.trim());
            }
        });
        messagesArea.appendChild(card);
    }

    function renderAssistantMessage(msg, index) {
        const card = document.createElement('div');
        card.className = 'message-card assistant';
        const bodyDiv = document.createElement('div');
        bodyDiv.className = 'message-body';
        if (msg.reasoning && msg.reasoning.trim()) {
            const reasoningDiv = document.createElement('div');
            reasoningDiv.className = 'reasoning-container';
            const header = document.createElement('div');
            header.className = 'reasoning-header';
            header.innerHTML = '<span class="arrow">▼</span> <span>🧠 深度思考过程</span>';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'reasoning-content';
            contentDiv.textContent = msg.reasoning;
            let collapsed = false;
            header.onclick = () => {
                collapsed = !collapsed;
                if (collapsed) {
                    header.classList.add('collapsed');
                    contentDiv.classList.add('hidden');
                } else {
                    header.classList.remove('collapsed');
                    contentDiv.classList.remove('hidden');
                }
            };
            reasoningDiv.appendChild(header);
            reasoningDiv.appendChild(contentDiv);
            bodyDiv.appendChild(reasoningDiv);
        }
        const bubble = document.createElement('div');
        bubble.className = 'bubble markdown-body';
        bubble.innerHTML = renderMarkdown(msg.content);
        bubble.querySelectorAll('pre code').forEach((block) => {
            hljs.highlightElement(block);
        });
        bodyDiv.appendChild(bubble);
        if (msg.sources) {
            bodyDiv.insertAdjacentHTML('beforeend', msg.sources);
        }
        const toolbar = document.createElement('div');
        toolbar.className = 'message-toolbar';
        const regenBtn = document.createElement('button');
        regenBtn.className = 'tool-btn';
        regenBtn.textContent = '🔄 重新生成';
        regenBtn.onclick = () => regenerateAssistant(index);
        toolbar.appendChild(regenBtn);
        if (msg.versions && msg.versions.length > 1) {
            const versionDiv = document.createElement('div');
            versionDiv.className = 'version-switcher';
            for (let v = 0; v < msg.versions.length; v++) {
                const btn = document.createElement('button');
                btn.className = `version-btn ${v === msg.versionIndex ? 'active' : ''}`;
                btn.textContent = `版本 ${v+1}`;
                btn.onclick = () => switchVersion(index, v);
                versionDiv.appendChild(btn);
            }
            toolbar.appendChild(versionDiv);
        }
        bodyDiv.appendChild(toolbar);
        card.appendChild(document.createElement('div')).className = 'message-avatar';
        card.children[0].textContent = '🤖';
        card.appendChild(bodyDiv);
        messagesArea.appendChild(card);
    }

    function showTypingIndicator() {
        const indicator = document.createElement('div');
        indicator.className = 'message-card assistant';
        indicator.id = 'typingIndicator';
        indicator.innerHTML = `<div class="message-avatar">🤖</div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
        messagesArea.appendChild(indicator);
        scrollToBottom();
    }

    function hideTypingIndicator() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    function scrollToBottom() {
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function autoResizeTextarea() {
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
    }

    // 事件绑定
    newChatBtn.addEventListener('click', () => {
        newSession();
        if (window.innerWidth <= 700) sidebar.classList.remove('open');
    });
    menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    messageInput.addEventListener('input', autoResizeTextarea);
    apiKeyInput.addEventListener('input', (e) => {
        const key = e.target.value.trim();
        if (key && key.startsWith('sk-')) localStorage.setItem('deepseek_api_key', key);
        else localStorage.removeItem('deepseek_api_key');
        updateApiStatus(key);
        saveSettings();
    });
    tavilyKeyInput.addEventListener('input', (e) => {
        const key = e.target.value.trim();
        if (key && key.startsWith('tvly-')) localStorage.setItem('tavily_api_key', key);
        else localStorage.removeItem('tavily_api_key');
        saveSettings();
    });
    tempSlider.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        tempValue.textContent = val.toFixed(1);
        localStorage.setItem('deepseek_temperature', val);
        saveSettings();
    });
    thinkToggle.addEventListener('click', () => {
        isReasoningMode = !isReasoningMode;
        if (isReasoningMode) thinkToggle.classList.add('active');
        else thinkToggle.classList.remove('active');
        localStorage.setItem('deepseek_reasoning_mode', isReasoningMode);
        saveSettings();
    });
    searchToggle.addEventListener('click', () => {
        isSearchMode = !isSearchMode;
        if (isSearchMode) searchToggle.classList.add('active');
        else searchToggle.classList.remove('active');
        localStorage.setItem('deepseek_search_mode', isSearchMode);
        saveSettings();
    });

    loadData();
    renderSessions();
    renderMessages();
    document.addEventListener('click', (e) => {
        if (window.innerWidth <= 700 && sidebar.classList.contains('open')) {
            if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        }
    });
</script>
</body>
</html>
