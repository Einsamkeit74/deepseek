<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DeepSeek 助手 - 可调温度</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-header {
            padding: 20px 24px;
            background: rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-header h1 {
            font-size: 1.5rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header h1::before {
            content: "🤖";
            font-size: 1.5rem;
        }

        .api-status {
            font-size: 0.75rem;
            margin-top: 8px;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .status-ready { background: #10b981; color: white; }
        .status-error { background: #ef4444; color: white; }
        .status-pending { background: #f59e0b; color: white; }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .messages-area::-webkit-scrollbar {
            width: 6px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #3b82f6;
        }

        .message.assistant .message-avatar {
            background: #8b5cf6;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .message.user .message-bubble {
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: rgba(255, 255, 255, 0.1);
            color: #e5e5e5;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            width: fit-content;
            border-bottom-left-radius: 4px;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #a78bfa;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .input-area {
            padding: 20px 24px;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        .input-area input:focus {
            border-color: #8b5cf6;
            background: rgba(255, 255, 255, 0.15);
        }

        .input-area input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border: none;
            border-radius: 28px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .input-area button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .input-area button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        .settings-panel {
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            font-size: 0.8rem;
        }

        .settings-panel label {
            color: rgba(255, 255, 255, 0.8);
        }

        .settings-panel input[type="password"],
        .settings-panel input[type="text"] {
            padding: 6px 10px;
            border-radius: 16px;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            width: 200px;
        }

        .temp-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 12px;
            border-radius: 24px;
        }
        .temp-control input {
            width: 140px;
            cursor: pointer;
        }
        .temp-value {
            min-width: 35px;
            text-align: center;
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 6px;
            border-radius: 20px;
            font-weight: 500;
        }

        .clear-btn {
            background: rgba(239, 68, 68, 0.3);
            padding: 6px 12px;
            border-radius: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .clear-btn:hover {
            background: rgba(239, 68, 68, 0.5);
        }

        @media (max-width: 600px) {
            .chat-container {
                height: 95vh;
                border-radius: 24px;
            }
            .message-bubble {
                max-width: 85%;
                font-size: 0.9rem;
            }
            .input-area button {
                padding: 12px 18px;
            }
            .settings-panel {
                gap: 10px;
            }
            .settings-panel input[type="password"] {
                width: 150px;
            }
            .temp-control input {
                width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>DeepSeek 助手 · 温度可调</h1>
            <div class="api-status" id="apiStatus">⚙️ 配置 API Key</div>
        </div>

        <div class="settings-panel">
            <label>🔑 API Key:</label>
            <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxx" value="">
            
            <div class="temp-control">
                <span>🌡️ 温度</span>
                <input type="range" id="tempSlider" min="0" max="2" step="0.1" value="1.5">
                <span class="temp-value" id="tempValue">1.5</span>
            </div>
            
            <div class="clear-btn" id="clearHistoryBtn">🗑️ 清空对话</div>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="message assistant">
                <div class="message-avatar">🤖</div>
                <div class="message-bubble">
                    你好！我是 DeepSeek 助手。<br>
                    请在上方输入你的 API Key 开始对话。<br>
                    🌡️ 当前温度设为 <strong>1.5</strong>（范围0-2，越高回答越多样/随机）
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
            <button id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        // DeepSeek API 配置
        const API_URL = 'https://api.deepseek.com/v1/chat/completions';
        
        // DOM 元素
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const apiStatus = document.getElementById('apiStatus');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const tempSlider = document.getElementById('tempSlider');
        const tempValue = document.getElementById('tempValue');
        
        // 对话历史（用于上下文）
        let conversationHistory = [];
        
        // 是否正在等待回复
        let isWaiting = false;
        
        // 从 localStorage 加载保存的 API Key 和温度
        function loadSettings() {
            const savedKey = localStorage.getItem('deepseek_api_key');
            if (savedKey) {
                apiKeyInput.value = savedKey;
                updateApiStatus(savedKey);
            }
            
            const savedTemp = localStorage.getItem('deepseek_temperature');
            if (savedTemp !== null) {
                const temp = parseFloat(savedTemp);
                tempSlider.value = temp;
                tempValue.textContent = temp.toFixed(1);
            } else {
                // 默认 1.5
                tempSlider.value = '1.5';
                tempValue.textContent = '1.5';
            }
        }
        
        // 保存 API Key
        function saveApiKey(key) {
            if (key && key.startsWith('sk-')) {
                localStorage.setItem('deepseek_api_key', key);
                updateApiStatus(key);
            } else if (!key) {
                localStorage.removeItem('deepseek_api_key');
                updateApiStatus('');
            } else {
                updateApiStatus(key);
            }
        }
        
        // 保存温度
        function saveTemperature(temp) {
            localStorage.setItem('deepseek_temperature', temp);
        }
        
        // 更新 API 状态显示
        function updateApiStatus(key) {
            if (key && key.startsWith('sk-')) {
                apiStatus.textContent = '✅ API Key 已配置';
                apiStatus.className = 'api-status status-ready';
            } else if (key && !key.startsWith('sk-')) {
                apiStatus.textContent = '⚠️ API Key 格式错误 (应以 sk- 开头)';
                apiStatus.className = 'api-status status-error';
            } else {
                apiStatus.textContent = '⚠️ 请在上方输入 API Key';
                apiStatus.className = 'api-status status-error';
            }
        }
        
        // 添加消息到界面
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = content;
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            messagesArea.appendChild(messageDiv);
            
            // 滚动到底部
            messagesArea.scrollTop = messagesArea.scrollHeight;
            
            return messageDiv;
        }
        
        // 显示/隐藏打字指示器
        function showTypingIndicator() {
            const indicatorDiv = document.createElement('div');
            indicatorDiv.className = 'message assistant';
            indicatorDiv.id = 'typingIndicator';
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '🤖';
            
            const typingBubble = document.createElement('div');
            typingBubble.className = 'typing-indicator';
            typingBubble.innerHTML = '<span></span><span></span><span></span>';
            
            indicatorDiv.appendChild(avatar);
            indicatorDiv.appendChild(typingBubble);
            messagesArea.appendChild(indicatorDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }
        
        // 调用 DeepSeek API
        async function callDeepSeekAPI(userMessage, temperature) {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                throw new Error('请先配置 API Key');
            }
            if (!apiKey.startsWith('sk-')) {
                throw new Error('API Key 格式错误，应以 sk- 开头');
            }
            
            // 将用户消息加入历史
            conversationHistory.push({ role: 'user', content: userMessage });
            
            // 构造请求体
            const payload = {
                model: 'deepseek-chat',
                messages: conversationHistory,
                temperature: temperature,
                max_tokens: 2048,
                stream: false
            };
            
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify(payload)
            });
            
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                if (response.status === 401) {
                    throw new Error('API Key 无效，请检查是否正确');
                } else if (response.status === 429) {
                    throw new Error('请求过于频繁，请稍后再试');
                } else {
                    throw new Error(errorData.error?.message || `API 请求失败 (${response.status})`);
                }
            }
            
            const data = await response.json();
            const assistantMessage = data.choices[0].message.content;
            
            // 将助手回复加入历史
            conversationHistory.push({ role: 'assistant', content: assistantMessage });
            
            // 限制历史长度（保留最近 20 条消息）
            if (conversationHistory.length > 20) {
                conversationHistory = conversationHistory.slice(-20);
            }
            
            return assistantMessage;
        }
        
        // 发送消息的主流程
        async function sendMessage() {
            const userInput = messageInput.value.trim();
            if (!userInput) return;
            
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                alert('请先在上方输入你的 DeepSeek API Key');
                return;
            }
            
            if (isWaiting) return;
            isWaiting = true;
            sendBtn.disabled = true;
            messageInput.disabled = true;
            
            // 显示用户消息
            addMessage('user', userInput);
            messageInput.value = '';
            
            // 获取当前温度
            const temperature = parseFloat(tempSlider.value);
            
            // 显示打字指示器
            showTypingIndicator();
            
            try {
                const reply = await callDeepSeekAPI(userInput, temperature);
                hideTypingIndicator();
                addMessage('assistant', reply);
            } catch (error) {
                hideTypingIndicator();
                addMessage('assistant', `❌ 出错了：${error.message}`);
                console.error('API 调用错误:', error);
            } finally {
                isWaiting = false;
                sendBtn.disabled = false;
                messageInput.disabled = false;
                messageInput.focus();
            }
        }
        
        // 清空对话历史
        function clearHistory() {
            conversationHistory = [];
            messagesArea.innerHTML = '';
            addMessage('assistant', '对话已清空！有什么我可以帮你的吗？\n🌡️ 当前温度：' + parseFloat(tempSlider.value).toFixed(1));
        }
        
        // 温度滑动条事件
        tempSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            tempValue.textContent = val.toFixed(1);
            saveTemperature(val);
            // 可选：在界面上非侵入式提示温度已变
            const tempHint = document.createElement('div');
            tempHint.className = 'message assistant';
            tempHint.style.opacity = '0.6';
            tempHint.style.fontSize = '0.8rem';
            // 为了避免过多提示，2秒后自动移除
            const hintDiv = document.createElement('div');
            hintDiv.className = 'message-bubble';
            hintDiv.textContent = `🌡️ 温度已调整为 ${val.toFixed(1)}`;
            tempHint.appendChild(document.createElement('div')).className = 'message-avatar';
            tempHint.children[0].textContent = '⚙️';
            tempHint.appendChild(hintDiv);
            messagesArea.appendChild(tempHint);
            messagesArea.scrollTop = messagesArea.scrollHeight;
            setTimeout(() => tempHint.remove(), 2000);
        });
        
        // 事件绑定
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        apiKeyInput.addEventListener('change', (e) => {
            saveApiKey(e.target.value.trim());
        });
        apiKeyInput.addEventListener('input', (e) => {
            const key = e.target.value.trim();
            if (key && key.startsWith('sk-')) {
                localStorage.setItem('deepseek_api_key', key);
                updateApiStatus(key);
            } else if (!key) {
                localStorage.removeItem('deepseek_api_key');
                updateApiStatus('');
            } else {
                updateApiStatus(key);
            }
        });
        
        clearHistoryBtn.addEventListener('click', clearHistory);
        
        // 初始化
        loadSettings();
        messageInput.focus();
    </script>
</body>
</html>
