<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DeepSeek 助手 - 深度思考模式</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-header {
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-header h1 {
            font-size: 1.3rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .api-status {
            font-size: 0.7rem;
            margin-top: 6px;
            padding: 3px 8px;
            border-radius: 20px;
            display: inline-block;
        }

        .status-ready { background: #10b981; color: white; }
        .status-error { background: #ef4444; color: white; }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .messages-area::-webkit-scrollbar {
            width: 6px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #3b82f6;
        }

        .message.assistant .message-avatar {
            background: #8b5cf6;
        }

        .message-content {
            max-width: 75%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .message.user .message-bubble {
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: rgba(255, 255, 255, 0.1);
            color: #e5e5e5;
            border-bottom-left-radius: 4px;
        }

        /* 思考过程样式 */
        .reasoning-container {
            background: rgba(139, 92, 246, 0.15);
            border-left: 3px solid #8b5cf6;
            border-radius: 12px;
            margin-bottom: 8px;
            overflow: hidden;
        }
        .reasoning-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #a78bfa;
            user-select: none;
            transition: background 0.2s;
        }
        .reasoning-header:hover {
            background: rgba(139, 92, 246, 0.1);
        }
        .reasoning-header .arrow {
            transition: transform 0.2s;
            font-size: 0.7rem;
        }
        .reasoning-header.collapsed .arrow {
            transform: rotate(-90deg);
        }
        .reasoning-content {
            padding: 12px 14px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            white-space: pre-wrap;
            border-top: 1px solid rgba(139, 92, 246, 0.2);
            display: block;
        }
        .reasoning-content.hidden {
            display: none;
        }

        /* 消息底部按钮栏 */
        .message-footer {
            display: flex;
            gap: 12px;
            margin-top: 4px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .message:hover .message-footer {
            opacity: 1;
        }
        .action-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.7rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 16px;
            transition: all 0.2s;
        }
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            width: fit-content;
            border-bottom-left-radius: 4px;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #a78bfa;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .input-area {
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .input-area input:focus {
            border-color: #8b5cf6;
            background: rgba(255, 255, 255, 0.15);
        }

        .input-area input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border: none;
            border-radius: 28px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .settings-panel {
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            font-size: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .settings-panel label {
            color: rgba(255, 255, 255, 0.7);
        }

        .settings-panel input[type="password"] {
            padding: 6px 10px;
            border-radius: 20px;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            width: 200px;
        }

        .temp-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 12px;
            border-radius: 24px;
        }
        .temp-control input {
            width: 120px;
            cursor: pointer;
        }
        .temp-value {
            min-width: 35px;
            text-align: center;
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 6px;
            border-radius: 20px;
        }

        /* 深度思考开关 */
        .think-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(139, 92, 246, 0.2);
            padding: 4px 12px;
            border-radius: 24px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .think-toggle:hover {
            background: rgba(139, 92, 246, 0.35);
        }
        .think-toggle .toggle-switch {
            width: 32px;
            height: 18px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 18px;
            position: relative;
            transition: background 0.2s;
        }
        .think-toggle .toggle-switch::after {
            content: "";
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }
        .think-toggle.active .toggle-switch {
            background: #8b5cf6;
        }
        .think-toggle.active .toggle-switch::after {
            transform: translateX(14px);
        }

        .clear-btn {
            background: rgba(239, 68, 68, 0.3);
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .clear-btn:hover {
            background: rgba(239, 68, 68, 0.5);
        }

        @media (max-width: 600px) {
            .chat-container { height: 95vh; }
            .message-content { max-width: 85%; }
            .settings-panel { gap: 10px; }
            .settings-panel input[type="password"] { width: 140px; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>DeepSeek 助手 · 深度思考模式</h1>
            <div class="api-status" id="apiStatus">⚙️ 配置 API Key</div>
        </div>

        <div class="settings-panel">
            <label>🔑 API Key:</label>
            <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxx" value="">
            
            <div class="temp-control">
                <span>🌡️ 温度</span>
                <input type="range" id="tempSlider" min="0" max="2" step="0.1" value="1.5">
                <span class="temp-value" id="tempValue">1.5</span>
            </div>

            <div class="think-toggle" id="thinkToggle">
                <span>🧠 深度思考</span>
                <div class="toggle-switch"></div>
            </div>

            <div class="clear-btn" id="clearHistoryBtn">🗑️ 清空</div>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="message assistant">
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="message-bubble">
                        你好！我是 DeepSeek 助手。<br>
                        • 开启「深度思考」会使用推理模型，显示 AI 的思考过程<br>
                        • 鼠标悬停消息可看到「重新生成」按钮
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
            <button id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.deepseek.com/v1/chat/completions';
        
        // DOM 元素
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const apiStatus = document.getElementById('apiStatus');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const tempSlider = document.getElementById('tempSlider');
        const tempValue = document.getElementById('tempValue');
        const thinkToggle = document.getElementById('thinkToggle');
        
        // 对话历史
        let conversationHistory = [];
        // 每条消息关联的原始问题（用于重新生成）
        let lastUserQuestion = '';
        let isWaiting = false;
        let isReasoningMode = false;

        // 加载保存的设置
        function loadSettings() {
            const savedKey = localStorage.getItem('deepseek_api_key');
            if (savedKey) {
                apiKeyInput.value = savedKey;
                updateApiStatus(savedKey);
            }
            const savedTemp = localStorage.getItem('deepseek_temperature');
            if (savedTemp !== null) {
                tempSlider.value = savedTemp;
                tempValue.textContent = parseFloat(savedTemp).toFixed(1);
            }
            const savedThinkMode = localStorage.getItem('deepseek_reasoning_mode');
            if (savedThinkMode === 'true') {
                isReasoningMode = true;
                thinkToggle.classList.add('active');
            }
        }

        function saveApiKey(key) {
            if (key && key.startsWith('sk-')) {
                localStorage.setItem('deepseek_api_key', key);
                updateApiStatus(key);
            } else if (!key) {
                localStorage.removeItem('deepseek_api_key');
                updateApiStatus('');
            }
        }

        function saveTemperature(temp) {
            localStorage.setItem('deepseek_temperature', temp);
        }

        function saveReasoningMode(enabled) {
            localStorage.setItem('deepseek_reasoning_mode', enabled);
        }

        function updateApiStatus(key) {
            if (key && key.startsWith('sk-')) {
                apiStatus.textContent = '✅ API Key 已配置';
                apiStatus.className = 'api-status status-ready';
            } else {
                apiStatus.textContent = '⚠️ 请输入 API Key';
                apiStatus.className = 'api-status status-error';
            }
        }

        // 添加用户消息
        function addUserMessage(content) {
            const messageDiv = createMessageElement('user', content);
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
            return messageDiv;
        }

        // 添加 AI 消息（带思考过程）
        function addAssistantMessage(content, reasoningContent = null, messageId = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '🤖';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            // 如果有思考内容，添加可折叠区域
            if (reasoningContent && reasoningContent.trim()) {
                const reasoningDiv = document.createElement('div');
                reasoningDiv.className = 'reasoning-container';
                
                const header = document.createElement('div');
                header.className = 'reasoning-header';
                header.innerHTML = '<span class="arrow">▼</span> <span>🧠 深度思考过程</span>';
                
                const reasoningBody = document.createElement('div');
                reasoningBody.className = 'reasoning-content';
                reasoningBody.textContent = reasoningContent;
                
                header.onclick = () => {
                    const isCollapsed = header.classList.contains('collapsed');
                    if (isCollapsed) {
                        header.classList.remove('collapsed');
                        reasoningBody.classList.remove('hidden');
                    } else {
                        header.classList.add('collapsed');
                        reasoningBody.classList.add('hidden');
                    }
                };
                
                reasoningDiv.appendChild(header);
                reasoningDiv.appendChild(reasoningBody);
                contentDiv.appendChild(reasoningDiv);
            }
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = content;
            contentDiv.appendChild(bubble);
            
            // 添加底部按钮栏
            const footer = document.createElement('div');
            footer.className = 'message-footer';
            const regenBtn = document.createElement('button');
            regenBtn.className = 'action-btn';
            regenBtn.textContent = '🔄 重新生成';
            regenBtn.onclick = () => regenerateLastMessage();
            footer.appendChild(regenBtn);
            contentDiv.appendChild(footer);
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            
            // 存储消息ID用于重新生成定位
            if (messageId) {
                messageDiv.dataset.messageId = messageId;
            }
            
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
            return messageDiv;
        }

        function createMessageElement(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = content;
            div.appendChild(avatar);
            div.appendChild(bubble);
            return div;
        }

        // 重新生成最后一条回复
        async function regenerateLastMessage() {
            if (isWaiting) {
                alert('请等待当前回复完成');
                return;
            }
            if (!lastUserQuestion) {
                alert('没有可重新生成的消息');
                return;
            }
            
            // 移除最后一条 AI 消息
            const messages = document.querySelectorAll('.message.assistant');
            if (messages.length > 0) {
                const lastAssistant = messages[messages.length - 1];
                lastAssistant.remove();
            }
            
            // 从历史中移除最后一条 assistant 回复
            if (conversationHistory.length > 0 && conversationHistory[conversationHistory.length - 1].role === 'assistant') {
                conversationHistory.pop();
            }
            
            // 重新发送
            await sendToAPI(lastUserQuestion);
        }

        // 显示打字指示器
        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'message assistant';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="typing-indicator"><span></span><span></span><span></span></div>
            `;
            messagesArea.appendChild(indicator);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function hideTypingIndicator() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        // 调用 API
        async function sendToAPI(userMessage) {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                alert('请先输入 API Key');
                return false;
            }
            
            const temperature = parseFloat(tempSlider.value);
            const model = isReasoningMode ? 'deepseek-reasoner' : 'deepseek-chat';
            
            // 保存用户问题
            lastUserQuestion = userMessage;
            
            // 添加到历史
            conversationHistory.push({ role: 'user', content: userMessage });
            
            const payload = {
                model: model,
                messages: conversationHistory,
                temperature: temperature,
                max_tokens: 4096,
                stream: false
            };
            
            showTypingIndicator();
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.error?.message || `请求失败 (${response.status})`);
                }
                
                const data = await response.json();
                const assistantMsg = data.choices[0].message;
                const content = assistantMsg.content;
                const reasoning = assistantMsg.reasoning_content || null;
                
                hideTypingIndicator();
                addAssistantMessage(content, reasoning, Date.now().toString());
                
                conversationHistory.push({ role: 'assistant', content: content });
                
                if (conversationHistory.length > 30) {
                    conversationHistory = conversationHistory.slice(-30);
                }
                
                return true;
            } catch (error) {
                hideTypingIndicator();
                const errorDiv = createMessageElement('assistant', `❌ 错误：${error.message}`);
                messagesArea.appendChild(errorDiv);
                messagesArea.scrollTop = messagesArea.scrollHeight;
                return false;
            }
        }

        // 发送消息主流程
        async function sendMessage() {
            const userInput = messageInput.value.trim();
            if (!userInput) return;
            if (isWaiting) return;
            
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                alert('请先输入 API Key');
                return;
            }
            
            isWaiting = true;
            sendBtn.disabled = true;
            messageInput.disabled = true;
            
            addUserMessage(userInput);
            messageInput.value = '';
            
            await sendToAPI(userInput);
            
            isWaiting = false;
            sendBtn.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
        }

        function clearHistory() {
            conversationHistory = [];
            lastUserQuestion = '';
            messagesArea.innerHTML = '';
            const welcomeDiv = createMessageElement('assistant', '对话已清空！有什么我可以帮你的吗？\n🧠 开启「深度思考」可以看到 AI 的推理过程。');
            messagesArea.appendChild(welcomeDiv);
        }

        // 事件绑定
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });
        
        apiKeyInput.addEventListener('input', (e) => {
            const key = e.target.value.trim();
            if (key && key.startsWith('sk-')) {
                localStorage.setItem('deepseek_api_key', key);
                updateApiStatus(key);
            } else if (!key) {
                localStorage.removeItem('deepseek_api_key');
                updateApiStatus('');
            } else {
                updateApiStatus(key);
            }
        });
        
        tempSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            tempValue.textContent = val.toFixed(1);
            saveTemperature(val);
        });
        
        thinkToggle.addEventListener('click', () => {
            isReasoningMode = !isReasoningMode;
            if (isReasoningMode) {
                thinkToggle.classList.add('active');
                const hint = createMessageElement('assistant', '🧠 深度思考模式已开启！\n将使用 deepseek-reasoner 模型，回复前会先显示思考过程。');
                messagesArea.appendChild(hint);
                messagesArea.scrollTop = messagesArea.scrollHeight;
                setTimeout(() => hint.remove(), 3000);
            } else {
                thinkToggle.classList.remove('active');
            }
            saveReasoningMode(isReasoningMode);
        });
        
        clearHistoryBtn.addEventListener('click', clearHistory);
        
        // 初始化
        loadSettings();
        messageInput.focus();
    </script>
</body>
</html>
