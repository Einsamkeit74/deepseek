<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DeepSeek 写作助手 · 多搜索引擎</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 主题变量 */
        :root {
            --bg-sidebar: rgba(20, 20, 35, 0.95);
            --bg-main-start: #1a1a2e;
            --bg-main-end: #16213e;
            --bg-message-user: #3b82f6;
            --bg-message-assistant: rgba(255, 255, 255, 0.1);
            --text-primary: #e5e5e5;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.3);
            --code-bg: rgba(0, 0, 0, 0.3);
            --reasoning-bg: rgba(139, 92, 246, 0.15);
        }

        body.light {
            --bg-sidebar: rgba(240, 240, 245, 0.95);
            --bg-main-start: #f0f2f5;
            --bg-main-end: #e4e6eb;
            --bg-message-user: #0084ff;
            --bg-message-assistant: #e4e6eb;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a5a;
            --border-color: rgba(0, 0, 0, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.1);
            --code-bg: rgba(0, 0, 0, 0.05);
            --reasoning-bg: rgba(139, 92, 246, 0.1);
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            height: 100vh;
            overflow: hidden;
            background: var(--bg-main-start);
            transition: background 0.2s, color 0.2s;
            color: var(--text-primary);
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
            z-index: 20;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .session-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            margin-bottom: 4px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-primary);
        }
        .session-item:hover { background: rgba(139, 92, 246, 0.2); }
        .session-item.active { background: rgba(139, 92, 246, 0.4); color: white; }
        .session-name {
            flex: 1;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .session-actions {
            display: flex;
            gap: 6px;
            opacity: 0;
        }
        .session-item:hover .session-actions { opacity: 1; }
        .session-action {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 4px;
            border-radius: 6px;
        }

        /* 主区域 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, var(--bg-main-start), var(--bg-main-end));
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chat-header h1 { font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        .menu-toggle { display: none; background: none; border: none; color: var(--text-primary); font-size: 1.5rem; cursor: pointer; }
        .api-status { font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; background: rgba(0,0,0,0.5); }
        .settings-icon {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: background 0.2s;
            color: var(--text-primary);
        }
        .settings-icon:hover {
            background: rgba(255,255,255,0.1);
        }

        /* 设置面板（可折叠） */
        .settings-panel {
            position: absolute;
            top: 60px;
            right: 20px;
            width: 360px;
            max-height: 80vh;
            overflow-y: auto;
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px var(--shadow-color);
            padding: 16px;
            display: none;
            flex-direction: column;
            gap: 16px;
            z-index: 30;
        }
        .settings-panel.open {
            display: flex;
        }
        .settings-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .settings-group label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        input, select {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 6px 12px;
            color: var(--text-primary);
            font-size: 0.8rem;
            width: 100%;
        }
        select {
            cursor: pointer;
        }
        .temp-slider {
            width: 140px;
        }
        .toggle-switch {
            width: 44px;
            height: 22px;
            background: rgba(255,255,255,0.3);
            border-radius: 22px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }
        .toggle-switch::after {
            content: "";
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }
        .toggle-switch.active {
            background: #8b5cf6;
        }
        .toggle-switch.active::after {
            transform: translateX(22px);
        }
        .theme-buttons, .fontsize-buttons {
            display: flex;
            gap: 8px;
        }
        .theme-btn, .fontsize-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            color: var(--text-primary);
        }
        .theme-btn.active, .fontsize-btn.active {
            background: #8b5cf6;
            color: white;
        }
        hr {
            border-color: var(--border-color);
        }

        /* 消息区域字体大小 */
        body.font-small .message-bubble, body.font-small .bubble.markdown-body {
            font-size: 0.85rem;
        }
        body.font-medium .message-bubble, body.font-medium .bubble.markdown-body {
            font-size: 1rem;
        }
        body.font-large .message-bubble, body.font-large .bubble.markdown-body {
            font-size: 1.15rem;
        }

        /* 其余样式继承之前的完整样式（保持原有功能） */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .message-card {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.2s ease;
        }
        .message-card.user { flex-direction: row-reverse; }
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .user .message-avatar { background: var(--bg-message-user); }
        .assistant .message-avatar { background: #8b5cf6; }
        .message-body {
            max-width: 75%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .bubble {
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.5;
        }
        .user .bubble {
            background: var(--bg-message-user);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .assistant .bubble {
            background: var(--bg-message-assistant);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }
        .bubble.markdown-body {
            background: var(--bg-message-assistant);
            padding: 12px 16px;
        }
        .bubble.markdown-body p { margin: 0.5em 0; }
        .bubble.markdown-body code {
            background: var(--code-bg);
            padding: 2px 5px;
            border-radius: 6px;
        }
        .bubble.markdown-body pre {
            background: var(--code-bg);
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
        }
        .reasoning-container {
            background: var(--reasoning-bg);
            border-left: 3px solid #8b5cf6;
            border-radius: 12px;
            overflow: hidden;
        }
        .reasoning-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #a78bfa;
        }
        .reasoning-content {
            padding: 12px 14px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            white-space: pre-wrap;
            border-top: 1px solid var(--border-color);
        }
        .reasoning-content.hidden { display: none; }
        .message-toolbar {
            display: flex;
            gap: 12px;
            margin-top: 4px;
            opacity: 0.5;
        }
        .message-card:hover .message-toolbar { opacity: 1; }
        .tool-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.7rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 16px;
        }
        .version-switcher {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            font-size: 0.7rem;
        }
        .version-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--text-primary);
            padding: 3px 8px;
            border-radius: 16px;
            cursor: pointer;
        }
        .version-btn.active {
            background: #8b5cf6;
            color: white;
        }
        .sources {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border-color);
            font-size: 0.75rem;
        }
        .sources a {
            color: #a78bfa;
            text-decoration: none;
            margin-right: 12px;
        }
        .input-area {
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
        }
        .input-area textarea {
            flex: 1;
            padding: 12px 18px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-family: inherit;
            resize: vertical;
            outline: none;
            min-height: 44px;
            max-height: 150px;
        }
        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border: none;
            border-radius: 28px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--bg-message-assistant);
            border-radius: 20px;
            width: fit-content;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #a78bfa;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        @keyframes bounce { 0%,60%,100%{ transform: translateY(0); } 30%{ transform: translateY(-10px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 700px) {
            .sidebar { position: fixed; left: 0; top: 0; height: 100%; transform: translateX(-100%); box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
            .sidebar.open { transform: translateX(0); }
            .menu-toggle { display: block; }
            .message-body { max-width: 85%; }
            .settings-panel { width: 300px; right: 10px; top: 50px; }
        }
    </style>
</head>
<body class="font-medium">
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn">➕ 新建对话</button>
        </div>
        <div class="sessions-list" id="sessionsList"></div>
    </div>
    <div class="main">
        <div class="chat-header">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <h1>DeepSeek 写作助手 · 多搜索引擎</h1>
            <div style="display: flex; gap: 12px; align-items: center;">
                <div class="api-status" id="apiStatus">⚙️ 配置 Key</div>
                <button class="settings-icon" id="settingsToggle">⚙️</button>
            </div>
        </div>

        <!-- 浮动设置面板 -->
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-group">
                <label>🔑 DeepSeek API Key</label>
                <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxx">
            </div>
            <hr>
            <div class="settings-group">
                <div class="settings-row">
                    <span>🌡️ 温度</span>
                    <input type="range" id="tempSlider" min="0" max="2" step="0.1" value="1.5" style="width: 140px;">
                    <span id="tempValue" style="min-width: 35px;">1.5</span>
                </div>
            </div>
            <div class="settings-group">
                <div class="settings-row">
                    <span>🧠 深度思考</span>
                    <div class="toggle-switch" id="thinkToggleSwitch"></div>
                </div>
            </div>
            <hr>
            <div class="settings-group">
                <label>🔍 搜索设置</label>
                <div class="settings-row">
                    <span>🌐 联网搜索</span>
                    <div class="toggle-switch" id="searchToggleSwitch"></div>
                </div>
                <div class="settings-row">
                    <span>选择搜索引擎</span>
                    <select id="searchEngineSelect">
                        <option value="tavily">Tavily (优化版)</option>
                        <option value="perplexity">Perplexity</option>
                        <option value="exa">Exa</option>
                    </select>
                </div>
                <div id="tavilyKeyGroup">
                    <label>Tavily API Key (tvly-xxx)</label>
                    <input type="password" id="tavilyKeyInput" placeholder="tvly-xxxxxxxx">
                </div>
                <div id="perplexityKeyGroup" style="display:none;">
                    <label>Perplexity API Key (pplx-xxx)</label>
                    <input type="password" id="perplexityKeyInput" placeholder="pplx-xxxxxxxx">
                </div>
                <div id="exaKeyGroup" style="display:none;">
                    <label>Exa API Key (exa-xxx)</label>
                    <input type="password" id="exaKeyInput" placeholder="exa-xxxxxxxx">
                </div>
            </div>
            <hr>
            <div class="settings-group">
                <label>📐 字号</label>
                <div class="fontsize-buttons">
                    <button class="fontsize-btn" data-size="small">小</button>
                    <button class="fontsize-btn active" data-size="medium">中</button>
                    <button class="fontsize-btn" data-size="large">大</button>
                </div>
            </div>
            <div class="settings-group">
                <label>🎨 主题</label>
                <div class="theme-buttons">
                    <button class="theme-btn" data-theme="dark">深色</button>
                    <button class="theme-btn active" data-theme="light">浅色</button>
                </div>
            </div>
        </div>

        <div class="messages-area" id="messagesArea"></div>
        <div class="input-area">
            <textarea id="messageInput" rows="1" placeholder="输入消息... (Shift+Enter换行，Enter发送)"></textarea>
            <button id="sendBtn">发送</button>
        </div>
    </div>
</div>

<script>
    // ---------- 数据结构 ----------
    let sessions = [];
    let currentSessionId = null;
    let isWaiting = false;
    let isReasoningMode = false;
    let isSearchMode = false;
    let currentSearchEngine = 'tavily'; // 'tavily', 'perplexity', 'exa'

    // DOM 元素
    const sidebar = document.getElementById('sidebar');
    const menuToggle = document.getElementById('menuToggle');
    const sessionsList = document.getElementById('sessionsList');
    const newChatBtn = document.getElementById('newChatBtn');
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const tavilyKeyInput = document.getElementById('tavilyKeyInput');
    const perplexityKeyInput = document.getElementById('perplexityKeyInput');
    const exaKeyInput = document.getElementById('exaKeyInput');
    const apiStatus = document.getElementById('apiStatus');
    const tempSlider = document.getElementById('tempSlider');
    const tempValue = document.getElementById('tempValue');
    const thinkToggleSwitch = document.getElementById('thinkToggleSwitch');
    const searchToggleSwitch = document.getElementById('searchToggleSwitch');
    const settingsPanel = document.getElementById('settingsPanel');
    const settingsToggle = document.getElementById('settingsToggle');
    const searchEngineSelect = document.getElementById('searchEngineSelect');
    const tavilyKeyGroup = document.getElementById('tavilyKeyGroup');
    const perplexityKeyGroup = document.getElementById('perplexityKeyGroup');
    const exaKeyGroup = document.getElementById('exaKeyGroup');

    // 主题/字号控制
    let currentTheme = 'light';
    let currentFontSize = 'medium';

    function applyTheme(theme) {
        if (theme === 'dark') document.body.classList.remove('light');
        else document.body.classList.add('light');
        currentTheme = theme;
        localStorage.setItem('app_theme', theme);
        document.querySelectorAll('.theme-btn').forEach(btn => {
            if (btn.dataset.theme === theme) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    function applyFontSize(size) {
        document.body.classList.remove('font-small', 'font-medium', 'font-large');
        document.body.classList.add(`font-${size}`);
        currentFontSize = size;
        localStorage.setItem('app_fontsize', size);
        document.querySelectorAll('.fontsize-btn').forEach(btn => {
            if (btn.dataset.size === size) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    function loadAppearance() {
        const savedTheme = localStorage.getItem('app_theme');
        if (savedTheme === 'dark') applyTheme('dark');
        else applyTheme('light');
        const savedSize = localStorage.getItem('app_fontsize');
        if (savedSize && ['small', 'medium', 'large'].includes(savedSize)) applyFontSize(savedSize);
        else applyFontSize('medium');
    }

    // 辅助函数
    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'>'); }
    function renderMarkdown(text) { if (!text) return ''; return marked.parse(text, { breaks: true, gfm: true }); }
    function updateToggleSwitch(el, active) { if (active) el.classList.add('active'); else el.classList.remove('active'); }

    // 存储
    function loadData() {
        const stored = localStorage.getItem('deepseek_branch_sessions');
        if (stored) sessions = JSON.parse(stored);
        else sessions = [{ id: generateId(), name: '新对话', messages: [] }];
        const storedCurrent = localStorage.getItem('deepseek_branch_current');
        if (storedCurrent && sessions.find(s => s.id === storedCurrent)) currentSessionId = storedCurrent;
        else currentSessionId = sessions[0].id;
        const savedKey = localStorage.getItem('deepseek_api_key');
        if (savedKey) apiKeyInput.value = savedKey;
        const savedTavily = localStorage.getItem('tavily_api_key');
        if (savedTavily) tavilyKeyInput.value = savedTavily;
        const savedPerplexity = localStorage.getItem('perplexity_api_key');
        if (savedPerplexity) perplexityKeyInput.value = savedPerplexity;
        const savedExa = localStorage.getItem('exa_api_key');
        if (savedExa) exaKeyInput.value = savedExa;
        const savedTemp = localStorage.getItem('deepseek_temperature');
        if (savedTemp) { tempSlider.value = savedTemp; tempValue.textContent = parseFloat(savedTemp).toFixed(1); }
        const savedReason = localStorage.getItem('deepseek_reasoning_mode');
        isReasoningMode = savedReason === 'true';
        updateToggleSwitch(thinkToggleSwitch, isReasoningMode);
        const savedSearch = localStorage.getItem('deepseek_search_mode');
        isSearchMode = savedSearch === 'true';
        updateToggleSwitch(searchToggleSwitch, isSearchMode);
        const savedEngine = localStorage.getItem('search_engine');
        if (savedEngine && ['tavily', 'perplexity', 'exa'].includes(savedEngine)) {
            currentSearchEngine = savedEngine;
            searchEngineSelect.value = savedEngine;
        } else {
            currentSearchEngine = 'tavily';
            searchEngineSelect.value = 'tavily';
        }
        updateApiStatus(apiKeyInput.value.trim());
        toggleKeyGroupVisibility();
    }

    function saveSessions() { localStorage.setItem('deepseek_branch_sessions', JSON.stringify(sessions)); localStorage.setItem('deepseek_branch_current', currentSessionId); }
    function saveSettings() {
        localStorage.setItem('deepseek_api_key', apiKeyInput.value.trim());
        localStorage.setItem('tavily_api_key', tavilyKeyInput.value.trim());
        localStorage.setItem('perplexity_api_key', perplexityKeyInput.value.trim());
        localStorage.setItem('exa_api_key', exaKeyInput.value.trim());
        localStorage.setItem('deepseek_temperature', tempSlider.value);
        localStorage.setItem('deepseek_reasoning_mode', isReasoningMode);
        localStorage.setItem('deepseek_search_mode', isSearchMode);
        localStorage.setItem('search_engine', currentSearchEngine);
    }
    function updateApiStatus(key) {
        if (key && key.startsWith('sk-')) { apiStatus.textContent = '✅ DeepSeek Key'; apiStatus.style.background = '#10b981'; }
        else { apiStatus.textContent = '⚠️ 需配置 Key'; apiStatus.style.background = '#ef4444'; }
    }
    function toggleKeyGroupVisibility() {
        tavilyKeyGroup.style.display = currentSearchEngine === 'tavily' ? 'flex' : 'none';
        perplexityKeyGroup.style.display = currentSearchEngine === 'perplexity' ? 'flex' : 'none';
        exaKeyGroup.style.display = currentSearchEngine === 'exa' ? 'flex' : 'none';
    }

    // 会话管理
    function renderSessions() {
        sessionsList.innerHTML = '';
        sessions.forEach(session => {
            const div = document.createElement('div');
            div.className = `session-item ${session.id === currentSessionId ? 'active' : ''}`;
            div.innerHTML = `<span class="session-name">${escapeHtml(session.name)}</span><div class="session-actions"><button class="session-action rename">✏️</button><button class="session-action delete">🗑️</button></div>`;
            div.querySelector('.session-name').addEventListener('click', () => switchSession(session.id));
            div.querySelector('.rename').addEventListener('click', (e) => { e.stopPropagation(); renameSession(session.id); });
            div.querySelector('.delete').addEventListener('click', (e) => { e.stopPropagation(); deleteSession(session.id); });
            sessionsList.appendChild(div);
        });
    }
    function switchSession(id) { if (id === currentSessionId) return; currentSessionId = id; saveSessions(); renderSessions(); renderMessages(); }
    function renameSession(id) { const s = sessions.find(s=>s.id===id); if(!s) return; const newName = prompt('新名称', s.name); if(newName?.trim()){ s.name = newName.trim().slice(0,30); saveSessions(); renderSessions(); } }
    function deleteSession(id) { if(sessions.length===1) { alert('至少保留一个'); return; } if(confirm('删除？')){ sessions = sessions.filter(s=>s.id!==id); if(currentSessionId===id) currentSessionId=sessions[0].id; saveSessions(); renderSessions(); renderMessages(); } }
    function newSession() { const newId = generateId(); sessions.push({ id: newId, name: `新对话 ${sessions.length+1}`, messages: [] }); currentSessionId = newId; saveSessions(); renderSessions(); renderMessages(); }
    function getCurrentSession() { return sessions.find(s=>s.id===currentSessionId); }

    // ---------- 搜索 API 实现 ----------
    // Tavily 优化版
    async function searchTavily(query) {
        const apiKey = tavilyKeyInput.value.trim();
        if (!apiKey) throw new Error('未配置 Tavily API Key');
        if (!apiKey.startsWith('tvly-')) throw new Error('Tavily Key 格式错误，应以 tvly- 开头');
        const response = await fetch('https://api.tavily.com/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                api_key: apiKey,
                query: query,
                search_depth: 'advanced',      // 深度搜索
                include_answer: true,
                include_raw_content: true,     // 获取原始内容
                max_results: 8                // 更多结果
            })
        });
        if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.error || `Tavily 请求失败 (${response.status})`);
        }
        const data = await response.json();
        return {
            answer: data.answer,
            results: (data.results || []).map(r => ({
                title: r.title,
                url: r.url,
                content: r.content,
                raw_content: r.raw_content || r.content
            }))
        };
    }

    // Perplexity API (类 Chat 接口)
    async function searchPerplexity(query) {
        const apiKey = perplexityKeyInput.value.trim();
        if (!apiKey) throw new Error('未配置 Perplexity API Key');
        if (!apiKey.startsWith('pplx-')) throw new Error('Perplexity Key 格式错误，应以 pplx- 开头');
        const response = await fetch('https://api.perplexity.ai/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
                model: 'llama-3.1-sonar-small-128k-online',
                messages: [{ role: 'user', content: query }],
                max_tokens: 2000,
                temperature: 0.2,
                top_p: 0.9,
                return_citations: true
            })
        });
        if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.error?.message || `Perplexity 请求失败 (${response.status})`);
        }
        const data = await response.json();
        const content = data.choices[0].message.content;
        const citations = data.citations || [];
        // 将引用整理为类似 Tavily 的 results 结构
        const results = citations.map((url, idx) => ({
            title: `来源 ${idx+1}`,
            url: url,
            content: '',
            raw_content: ''
        }));
        return {
            answer: content,
            results: results
        };
    }

    // Exa API
    async function searchExa(query) {
        const apiKey = exaKeyInput.value.trim();
        if (!apiKey) throw new Error('未配置 Exa API Key');
        if (!apiKey.startsWith('exa-')) throw new Error('Exa Key 格式错误，应以 exa- 开头');
        const response = await fetch('https://api.exa.ai/search', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
                query: query,
                numResults: 8,
                type: 'auto',
                includeText: true
            })
        });
        if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.message || `Exa 请求失败 (${response.status})`);
        }
        const data = await response.json();
        const results = (data.results || []).map(r => ({
            title: r.title,
            url: r.url,
            content: r.text || '',
            raw_content: r.text || ''
        }));
        // Exa 不提供摘要答案，我们留空
        return {
            answer: '',
            results: results
        };
    }

    // 统一搜索入口
    async function performSearch(query) {
        switch (currentSearchEngine) {
            case 'tavily':
                return await searchTavily(query);
            case 'perplexity':
                return await searchPerplexity(query);
            case 'exa':
                return await searchExa(query);
            default:
                throw new Error('未知搜索引擎');
        }
    }

    // 判断是否需要搜索
    function shouldUseWebSearch(q) {
        if (!isSearchMode) return false;
        const keywords = ['天气','新闻','最新','今天','现在','实时','行情','股票','价格','汇率','比赛','2025','2026','发生','事件','搜索','查一下','资料','参考文献','引用','来源','数据','统计','报告','论文','研究','写作'];
        return keywords.some(k => q.toLowerCase().includes(k));
    }

    // 核心：生成回复（支持联网搜索）
    async function generateResponseForLastUserInSession(session) {
        const userMsgs = session.messages.filter(m => m.role === 'user');
        if (!userMsgs.length) return;
        const lastUser = userMsgs[userMsgs.length-1];
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) { alert('请配置 DeepSeek Key'); return; }
        isWaiting = true;
        sendBtn.disabled = true;
        messageInput.disabled = true;
        showTypingIndicator();
        try {
            const temperature = parseFloat(tempSlider.value);
            const model = isReasoningMode ? 'deepseek-reasoner' : 'deepseek-chat';
            let searchData = null;
            let systemMsg = '';
            if (shouldUseWebSearch(lastUser.content)) {
                try {
                    searchData = await performSearch(lastUser.content);
                } catch (e) {
                    console.warn('搜索失败:', e);
                    // 搜索失败不影响正常对话
                }
            }
            // 构建系统提示
            let finalSystemPrompt = '';
            if (searchData && (searchData.answer || searchData.results.length)) {
                let searchText = '';
                if (searchData.answer) {
                    searchText += `搜索摘要：${searchData.answer}\n\n`;
                }
                searchText += `搜索结果详情：\n`;
                searchData.results.forEach((r, i) => {
                    searchText += `${i+1}. 标题：${r.title}\n   内容：${r.raw_content || r.content || '无'}\n   来源：${r.url}\n\n`;
                });
                finalSystemPrompt = `你是一个严谨的写作助手。请严格基于以下搜索结果回答用户的问题。对于每个事实，请在句末注明来源编号，例如 [citation:1]。如果搜索结果不足以回答问题，请明确告知。\n\n${searchText}`;
            }
            let apiMessages = [];
            if (finalSystemPrompt) {
                apiMessages.push({ role: 'system', content: finalSystemPrompt });
            }
            // 添加对话历史（不包含最后一条用户消息？最后一条用户消息我们已经知道，可以加上）
            // 为了避免重复，直接使用 session 中已有的消息，但注意不要重复 system
            for (const m of session.messages) {
                if (m.role === 'user') apiMessages.push({ role: 'user', content: m.content });
                else if (m.role === 'assistant') apiMessages.push({ role: 'assistant', content: m.content });
            }
            // 确保最后一条用户消息是最新的
            if (apiMessages.length === 0 || apiMessages[apiMessages.length-1].role !== 'user') {
                apiMessages.push({ role: 'user', content: lastUser.content });
            }
            const payload = {
                model: model,
                messages: apiMessages,
                temperature: temperature,
                max_tokens: 4096,
                stream: false
            };
            const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify(payload)
            });
            if (!resp.ok) {
                const errData = await resp.json().catch(() => ({}));
                throw new Error(errData.error?.message || `DeepSeek API 错误 ${resp.status}`);
            }
            const data = await resp.json();
            let content = data.choices[0].message.content;
            let reasoning = data.choices[0].message.reasoning_content || null;
            let sourcesHtml = '';
            if (searchData && searchData.results.length) {
                sourcesHtml = `<div class="sources"><strong>📎 引用来源：</strong><br>${searchData.results.map(r => `<a href="${r.url}" target="_blank" rel="noopener noreferrer">${r.title}</a>`).join(' ')}</div>`;
            }
            session.messages.push({
                role: 'assistant',
                content: content,
                reasoning: reasoning,
                versions: null,
                versionIndex: 0,
                sources: sourcesHtml
            });
            saveSessions();
            hideTypingIndicator();
            renderMessages();
        } catch (e) {
            hideTypingIndicator();
            session.messages.push({
                role: 'assistant',
                content: `❌ 错误：${e.message}`,
                reasoning: null
            });
            saveSessions();
            renderMessages();
        } finally {
            isWaiting = false;
            sendBtn.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
        }
    }

    async function sendMessage() {
        const userInput = messageInput.value.trim();
        if (!userInput || isWaiting) return;
        if (!apiKeyInput.value.trim()) { alert('请配置 DeepSeek Key'); return; }
        const session = getCurrentSession();
        session.messages.push({ role: 'user', content: userInput });
        saveSessions();
        renderMessages();
        messageInput.value = '';
        messageInput.style.height = 'auto';
        await generateResponseForLastUserInSession(session);
    }

    async function editUserMessageWithBranch(idx, newContent) {
        const old = getCurrentSession();
        const newId = generateId();
        const newName = old.name + ' - 分支';
        const newMsgs = old.messages.slice(0, idx+1);
        newMsgs[idx].content = newContent;
        const newSession = { id: newId, name: newName, messages: newMsgs };
        sessions.push(newSession);
        currentSessionId = newId;
        saveSessions();
        renderSessions();
        await generateResponseForLastUserInSession(newSession);
    }

    async function regenerateAssistant(msgIdx) {
        const session = getCurrentSession();
        const msg = session.messages[msgIdx];
        if (msg.role !== 'assistant') return;
        let userIdx = msgIdx-1;
        while (userIdx>=0 && session.messages[userIdx].role !== 'user') userIdx--;
        if (userIdx<0) return;
        const userMsg = session.messages[userIdx];
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) { alert('请配置 DeepSeek Key'); return; }
        isWaiting = true;
        sendBtn.disabled = true;
        showTypingIndicator();
        try {
            const temperature = parseFloat(tempSlider.value);
            const model = isReasoningMode ? 'deepseek-reasoner' : 'deepseek-chat';
            let searchData = null;
            let systemMsg = '';
            if (shouldUseWebSearch(userMsg.content)) {
                try {
                    searchData = await performSearch(userMsg.content);
                } catch(e) { console.warn(e); }
            }
            let finalSystemPrompt = '';
            if (searchData && (searchData.answer || searchData.results.length)) {
                let searchText = '';
                if (searchData.answer) searchText += `搜索摘要：${searchData.answer}\n\n`;
                searchText += `搜索结果详情：\n`;
                searchData.results.forEach((r, i) => {
                    searchText += `${i+1}. 标题：${r.title}\n   内容：${r.raw_content || r.content || '无'}\n   来源：${r.url}\n\n`;
                });
                finalSystemPrompt = `你是一个严谨的写作助手。请严格基于以下搜索结果回答用户的问题。对于每个事实，请在句末注明来源编号，例如 [citation:1]。如果搜索结果不足以回答问题，请明确告知。\n\n${searchText}`;
            }
            let apiMessages = [];
            if (finalSystemPrompt) apiMessages.push({ role: 'system', content: finalSystemPrompt });
            for (let i=0; i<=userIdx; i++) {
                const m = session.messages[i];
                if (m.role === 'user') apiMessages.push({ role: 'user', content: m.content });
                else if (m.role === 'assistant') apiMessages.push({ role: 'assistant', content: m.content });
            }
            const payload = {
                model: model,
                messages: apiMessages,
                temperature: temperature,
                max_tokens: 4096,
                stream: false
            };
            const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify(payload)
            });
            if (!resp.ok) throw new Error('重新生成失败');
            const data = await resp.json();
            const newContent = data.choices[0].message.content;
            const newReasoning = data.choices[0].message.reasoning_content || null;
            let sourcesHtml = '';
            if (searchData && searchData.results.length) {
                sourcesHtml = `<div class="sources"><strong>📎 引用来源：</strong><br>${searchData.results.map(r => `<a href="${r.url}" target="_blank">${r.title}</a>`).join(' ')}</div>`;
            }
            if (!msg.versions) msg.versions = [{ content: msg.content, reasoning: msg.reasoning, sources: msg.sources }];
            msg.versions.push({ content: newContent, reasoning: newReasoning, sources: sourcesHtml });
            msg.versionIndex = msg.versions.length-1;
            msg.content = newContent;
            msg.reasoning = newReasoning;
            msg.sources = sourcesHtml;
            saveSessions();
            hideTypingIndicator();
            renderMessages();
        } catch(e) {
            hideTypingIndicator();
            alert('重新生成失败：'+e.message);
        } finally {
            isWaiting = false;
            sendBtn.disabled = false;
        }
    }

    function switchVersion(msgIdx, verIdx) {
        const session = getCurrentSession();
        const msg = session.messages[msgIdx];
        if (!msg.versions) return;
        msg.versionIndex = verIdx;
        msg.content = msg.versions[verIdx].content;
        msg.reasoning = msg.versions[verIdx].reasoning;
        msg.sources = msg.versions[verIdx].sources;
        saveSessions();
        renderMessages();
    }

    function renderMessages() {
        const session = getCurrentSession();
        if (!session) return;
        messagesArea.innerHTML = '';
        for (let i=0; i<session.messages.length; i++) {
            const m = session.messages[i];
            if (m.role === 'user') renderUserMessage(m.content, i);
            else renderAssistantMessage(m, i);
        }
        scrollToBottom();
    }
    function renderUserMessage(content, idx) {
        const card = document.createElement('div'); card.className = 'message-card user';
        card.innerHTML = `<div class="message-avatar">👤</div><div class="message-body"><div class="bubble">${escapeHtml(content)}</div><div class="message-toolbar"><button class="tool-btn edit-msg">✏️ 编辑（分支）</button></div></div>`;
        card.querySelector('.edit-msg').addEventListener('click', async ()=>{
            const newC = prompt('修改内容（将创建新分支）', content);
            if (newC?.trim()) await editUserMessageWithBranch(idx, newC.trim());
        });
        messagesArea.appendChild(card);
    }
    function renderAssistantMessage(msg, idx) {
        const card = document.createElement('div'); card.className = 'message-card assistant';
        const bodyDiv = document.createElement('div'); bodyDiv.className = 'message-body';
        if (msg.reasoning) {
            const reasonDiv = document.createElement('div'); reasonDiv.className = 'reasoning-container';
            const header = document.createElement('div'); header.className = 'reasoning-header'; header.innerHTML = '<span class="arrow">▼</span> <span>🧠 深度思考过程</span>';
            const contentDiv = document.createElement('div'); contentDiv.className = 'reasoning-content'; contentDiv.textContent = msg.reasoning;
            let collapsed = false;
            header.onclick = ()=>{ collapsed=!collapsed; if(collapsed){ header.classList.add('collapsed'); contentDiv.classList.add('hidden'); }else{ header.classList.remove('collapsed'); contentDiv.classList.remove('hidden'); } };
            reasonDiv.appendChild(header); reasonDiv.appendChild(contentDiv); bodyDiv.appendChild(reasonDiv);
        }
        const bubble = document.createElement('div'); bubble.className = 'bubble markdown-body'; bubble.innerHTML = renderMarkdown(msg.content);
        bubble.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
        bodyDiv.appendChild(bubble);
        if (msg.sources) bodyDiv.insertAdjacentHTML('beforeend', msg.sources);
        const toolbar = document.createElement('div'); toolbar.className = 'message-toolbar';
        const regenBtn = document.createElement('button'); regenBtn.className = 'tool-btn'; regenBtn.textContent = '🔄 重新生成';
        regenBtn.onclick = ()=> regenerateAssistant(idx);
        toolbar.appendChild(regenBtn);
        if (msg.versions && msg.versions.length>1) {
            const verDiv = document.createElement('div'); verDiv.className = 'version-switcher';
            for (let v=0; v<msg.versions.length; v++) {
                const btn = document.createElement('button'); btn.className = `version-btn ${v===msg.versionIndex?'active':''}`; btn.textContent = `版本 ${v+1}`;
                btn.onclick = ()=> switchVersion(idx, v);
                verDiv.appendChild(btn);
            }
            toolbar.appendChild(verDiv);
        }
        bodyDiv.appendChild(toolbar);
        card.appendChild(document.createElement('div')).className = 'message-avatar'; card.children[0].textContent = '🤖';
        card.appendChild(bodyDiv);
        messagesArea.appendChild(card);
    }

    function showTypingIndicator() {
        const ind = document.createElement('div'); ind.className = 'message-card assistant'; ind.id='typingIndicator';
        ind.innerHTML = `<div class="message-avatar">🤖</div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
        messagesArea.appendChild(ind); scrollToBottom();
    }
    function hideTypingIndicator() { const el = document.getElementById('typingIndicator'); if (el) el.remove(); }
    function scrollToBottom() { messagesArea.scrollTop = messagesArea.scrollHeight; }
    function autoResizeTextarea() { messageInput.style.height = 'auto'; messageInput.style.height = Math.min(messageInput.scrollHeight, 150)+'px'; }

    // 事件绑定
    newChatBtn.addEventListener('click', ()=>{ newSession(); if(window.innerWidth<=700) sidebar.classList.remove('open'); });
    menuToggle.addEventListener('click', ()=> sidebar.classList.toggle('open'));
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } });
    messageInput.addEventListener('input', autoResizeTextarea);
    apiKeyInput.addEventListener('input', ()=>{ saveSettings(); updateApiStatus(apiKeyInput.value.trim()); });
    tavilyKeyInput.addEventListener('input', saveSettings);
    perplexityKeyInput.addEventListener('input', saveSettings);
    exaKeyInput.addEventListener('input', saveSettings);
    tempSlider.addEventListener('input', ()=>{ const v=parseFloat(tempSlider.value); tempValue.textContent=v.toFixed(1); saveSettings(); });
    thinkToggleSwitch.addEventListener('click', ()=>{ isReasoningMode=!isReasoningMode; updateToggleSwitch(thinkToggleSwitch, isReasoningMode); saveSettings(); });
    searchToggleSwitch.addEventListener('click', ()=>{ isSearchMode=!isSearchMode; updateToggleSwitch(searchToggleSwitch, isSearchMode); saveSettings(); });
    searchEngineSelect.addEventListener('change', (e)=>{ currentSearchEngine = e.target.value; saveSettings(); toggleKeyGroupVisibility(); });
    settingsToggle.addEventListener('click', (e)=>{ e.stopPropagation(); settingsPanel.classList.toggle('open'); });
    document.addEventListener('click', (e)=>{ if(!settingsPanel.contains(e.target) && e.target !== settingsToggle && !settingsToggle.contains(e.target)) settingsPanel.classList.remove('open'); });

    document.querySelectorAll('.theme-btn').forEach(btn => btn.addEventListener('click', ()=>{ applyTheme(btn.dataset.theme); }));
    document.querySelectorAll('.fontsize-btn').forEach(btn => btn.addEventListener('click', ()=>{ applyFontSize(btn.dataset.size); }));

    loadData();
    loadAppearance();
    renderSessions();
    renderMessages();
    document.addEventListener('click', (e)=>{ if(window.innerWidth<=700 && sidebar.classList.contains('open') && !sidebar.contains(e.target) && !menuToggle.contains(e.target)) sidebar.classList.remove('open'); });
</script>
