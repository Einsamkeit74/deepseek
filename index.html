<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DeepSeek 多会话助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            height: 100vh;
            overflow: hidden;
        }

        /* 主布局 */
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: rgba(20, 20, 35, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
            z-index: 20;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .new-chat-btn:hover {
            opacity: 0.9;
        }

        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .session-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            margin-bottom: 4px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            color: #e0e0e0;
        }

        .session-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .session-item.active {
            background: rgba(139, 92, 246, 0.25);
            color: white;
        }

        .session-name {
            flex: 1;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 8px;
        }

        .session-actions {
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .session-item:hover .session-actions {
            opacity: 1;
        }

        .session-action {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 4px;
            border-radius: 6px;
        }

        .session-action:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        /* 右侧主区域 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
        }

        .chat-header {
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h1 {
            font-size: 1.2rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .api-status {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(0,0,0,0.5);
        }

        .settings-panel {
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            font-size: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .settings-panel label {
            color: rgba(255, 255, 255, 0.7);
        }

        .settings-panel input[type="password"] {
            padding: 6px 10px;
            border-radius: 20px;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            width: 180px;
        }

        .temp-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 12px;
            border-radius: 24px;
        }
        .temp-control input {
            width: 100px;
            cursor: pointer;
        }
        .temp-value {
            min-width: 35px;
            text-align: center;
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 6px;
            border-radius: 20px;
        }

        .think-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(139, 92, 246, 0.2);
            padding: 4px 12px;
            border-radius: 24px;
            cursor: pointer;
        }
        .think-toggle.active {
            background: rgba(139, 92, 246, 0.5);
        }
        .toggle-switch {
            width: 32px;
            height: 18px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 18px;
            position: relative;
        }
        .toggle-switch::after {
            content: "";
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }
        .think-toggle.active .toggle-switch::after {
            transform: translateX(14px);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }
        .message.user {
            flex-direction: row-reverse;
        }
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .message.user .message-avatar { background: #3b82f6; }
        .message.assistant .message-avatar { background: #8b5cf6; }
        .message-content {
            max-width: 75%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message-bubble {
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.5;
            font-size: 0.95rem;
        }
        .message.user .message-bubble {
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .message-bubble {
            background: rgba(255, 255, 255, 0.1);
            color: #e5e5e5;
            border-bottom-left-radius: 4px;
        }
        .reasoning-container {
            background: rgba(139, 92, 246, 0.15);
            border-left: 3px solid #8b5cf6;
            border-radius: 12px;
            overflow: hidden;
        }
        .reasoning-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #a78bfa;
        }
        .reasoning-content {
            padding: 12px 14px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            white-space: pre-wrap;
            border-top: 1px solid rgba(139, 92, 246, 0.2);
            display: block;
        }
        .reasoning-content.hidden {
            display: none;
        }
        .message-footer {
            display: flex;
            gap: 12px;
            margin-top: 4px;
            opacity: 0.5;
        }
        .message:hover .message-footer {
            opacity: 1;
        }
        .action-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.7rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 16px;
        }
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            width: fit-content;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #a78bfa;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        @keyframes bounce {
            0%,60%,100%{ transform: translateY(0); }
            30%{ transform: translateY(-10px); }
        }
        .input-area {
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 12px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border: none;
            border-radius: 28px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 700px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                transform: translateX(-100%);
                box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .menu-toggle {
                display: block;
            }
            .message-content {
                max-width: 85%;
            }
            .settings-panel input[type="password"] {
                width: 140px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn">➕ 新建对话</button>
        </div>
        <div class="sessions-list" id="sessionsList"></div>
    </div>
    <div class="main">
        <div class="chat-header">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <h1>DeepSeek 多会话</h1>
            <div class="api-status" id="apiStatus">⚙️ 配置 Key</div>
        </div>
        <div class="settings-panel">
            <label>🔑 API Key:</label>
            <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxx">
            <div class="temp-control">
                <span>🌡️ 温度</span>
                <input type="range" id="tempSlider" min="0" max="2" step="0.1" value="1.5">
                <span class="temp-value" id="tempValue">1.5</span>
            </div>
            <div class="think-toggle" id="thinkToggle">
                <span>🧠 深度思考</span>
                <div class="toggle-switch"></div>
            </div>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
            <button id="sendBtn">发送</button>
        </div>
    </div>
</div>

<script>
    // ---------- 存储结构 ----------
    // sessions: { id, name, messages: [{role, content, reasoning?}] }
    // currentSessionId
    // settings: apiKey, temperature, reasoningMode

    let sessions = [];
    let currentSessionId = null;
    let isWaiting = false;

    // DOM
    const sidebar = document.getElementById('sidebar');
    const menuToggle = document.getElementById('menuToggle');
    const sessionsList = document.getElementById('sessionsList');
    const newChatBtn = document.getElementById('newChatBtn');
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const apiStatus = document.getElementById('apiStatus');
    const tempSlider = document.getElementById('tempSlider');
    const tempValue = document.getElementById('tempValue');
    const thinkToggle = document.getElementById('thinkToggle');

    let isReasoningMode = false;

    // 加载本地数据
    function loadData() {
        const storedSessions = localStorage.getItem('deepseek_sessions');
        if (storedSessions) {
            sessions = JSON.parse(storedSessions);
        } else {
            // 默认创建一个会话
            sessions = [{
                id: generateId(),
                name: '新对话',
                messages: []
            }];
        }
        const storedCurrent = localStorage.getItem('deepseek_current_session');
        if (storedCurrent && sessions.find(s => s.id === storedCurrent)) {
            currentSessionId = storedCurrent;
        } else {
            currentSessionId = sessions[0].id;
        }
        // 加载设置
        const savedKey = localStorage.getItem('deepseek_api_key');
        if (savedKey) apiKeyInput.value = savedKey;
        const savedTemp = localStorage.getItem('deepseek_temperature');
        if (savedTemp) {
            tempSlider.value = savedTemp;
            tempValue.textContent = parseFloat(savedTemp).toFixed(1);
        }
        const savedReason = localStorage.getItem('deepseek_reasoning_mode');
        isReasoningMode = savedReason === 'true';
        if (isReasoningMode) thinkToggle.classList.add('active');
        else thinkToggle.classList.remove('active');
        updateApiStatus(apiKeyInput.value.trim());
    }

    function generateId() {
        return Date.now() + '-' + Math.random().toString(36).substr(2, 8);
    }

    function saveSessions() {
        localStorage.setItem('deepseek_sessions', JSON.stringify(sessions));
        localStorage.setItem('deepseek_current_session', currentSessionId);
    }

    function saveSettings() {
        localStorage.setItem('deepseek_api_key', apiKeyInput.value.trim());
        localStorage.setItem('deepseek_temperature', tempSlider.value);
        localStorage.setItem('deepseek_reasoning_mode', isReasoningMode);
    }

    function updateApiStatus(key) {
        if (key && key.startsWith('sk-')) {
            apiStatus.textContent = '✅ API Key 已配置';
            apiStatus.style.background = '#10b981';
        } else {
            apiStatus.textContent = '⚠️ 请输入 API Key';
            apiStatus.style.background = '#ef4444';
        }
    }

    // 渲染会话列表
    function renderSessions() {
        sessionsList.innerHTML = '';
        sessions.forEach(session => {
            const div = document.createElement('div');
            div.className = `session-item ${session.id === currentSessionId ? 'active' : ''}`;
            div.innerHTML = `
                <span class="session-name" data-id="${session.id}">${escapeHtml(session.name)}</span>
                <div class="session-actions">
                    <button class="session-action rename" data-id="${session.id}" title="重命名">✏️</button>
                    <button class="session-action delete" data-id="${session.id}" title="删除">🗑️</button>
                </div>
            `;
            div.querySelector('.session-name').addEventListener('click', (e) => {
                e.stopPropagation();
                switchSession(session.id);
            });
            div.querySelector('.rename').addEventListener('click', (e) => {
                e.stopPropagation();
                renameSession(session.id);
            });
            div.querySelector('.delete').addEventListener('click', (e) => {
                e.stopPropagation();
                deleteSession(session.id);
            });
            sessionsList.appendChild(div);
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function switchSession(sessionId) {
        if (sessionId === currentSessionId) return;
        currentSessionId = sessionId;
        saveSessions();
        renderSessions();
        renderMessages();
    }

    function renameSession(sessionId) {
        const session = sessions.find(s => s.id === sessionId);
        if (!session) return;
        const newName = prompt('请输入新名称', session.name);
        if (newName && newName.trim()) {
            session.name = newName.trim().substring(0, 30);
            saveSessions();
            renderSessions();
        }
    }

    function deleteSession(sessionId) {
        if (sessions.length === 1) {
            alert('至少保留一个对话');
            return;
        }
        if (confirm('删除后无法恢复，确定吗？')) {
            const index = sessions.findIndex(s => s.id === sessionId);
            if (index !== -1) {
                sessions.splice(index, 1);
                if (currentSessionId === sessionId) {
                    currentSessionId = sessions[0].id;
                }
                saveSessions();
                renderSessions();
                renderMessages();
            }
        }
    }

    function newSession() {
        const newId = generateId();
        const newSession = {
            id: newId,
            name: `新对话 ${sessions.length + 1}`,
            messages: []
        };
        sessions.push(newSession);
        currentSessionId = newId;
        saveSessions();
        renderSessions();
        renderMessages();
    }

    // 获取当前会话的消息
    function getCurrentMessages() {
        const session = sessions.find(s => s.id === currentSessionId);
        return session ? session.messages : [];
    }

    function addMessageToCurrent(role, content, reasoning = null) {
        const session = sessions.find(s => s.id === currentSessionId);
        if (session) {
            session.messages.push({ role, content, reasoning });
            saveSessions();
            renderMessages(); // 重新渲染以显示新消息
        }
    }

    function replaceLastAssistantMessage(content, reasoning = null) {
        const session = sessions.find(s => s.id === currentSessionId);
        if (session && session.messages.length > 0 && session.messages[session.messages.length-1].role === 'assistant') {
            session.messages.pop();
        }
        addMessageToCurrent('assistant', content, reasoning);
    }

    function renderMessages() {
        messagesArea.innerHTML = '';
        const messages = getCurrentMessages();
        for (const msg of messages) {
            if (msg.role === 'user') {
                renderUserMessage(msg.content);
            } else {
                renderAssistantMessage(msg.content, msg.reasoning);
            }
        }
        scrollToBottom();
    }

    function renderUserMessage(content) {
        const div = document.createElement('div');
        div.className = 'message user';
        div.innerHTML = `
            <div class="message-avatar">👤</div>
            <div class="message-bubble">${escapeHtml(content)}</div>
        `;
        messagesArea.appendChild(div);
    }

    function renderAssistantMessage(content, reasoning) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message assistant';
        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        if (reasoning && reasoning.trim()) {
            const reasoningDiv = document.createElement('div');
            reasoningDiv.className = 'reasoning-container';
            const header = document.createElement('div');
            header.className = 'reasoning-header';
            header.innerHTML = '<span class="arrow">▼</span> <span>🧠 深度思考过程</span>';
            const body = document.createElement('div');
            body.className = 'reasoning-content';
            body.textContent = reasoning;
            let collapsed = false;
            header.onclick = () => {
                collapsed = !collapsed;
                if (collapsed) {
                    header.classList.add('collapsed');
                    body.classList.add('hidden');
                } else {
                    header.classList.remove('collapsed');
                    body.classList.remove('hidden');
                }
            };
            reasoningDiv.appendChild(header);
            reasoningDiv.appendChild(body);
            contentDiv.appendChild(reasoningDiv);
        }
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.textContent = content;
        contentDiv.appendChild(bubble);
        const footer = document.createElement('div');
        footer.className = 'message-footer';
        const regenBtn = document.createElement('button');
        regenBtn.className = 'action-btn';
        regenBtn.textContent = '🔄 重新生成';
        regenBtn.onclick = () => regenerateLastMessage();
        footer.appendChild(regenBtn);
        contentDiv.appendChild(footer);
        messageDiv.appendChild(document.createElement('div')).className = 'message-avatar';
        messageDiv.children[0].textContent = '🤖';
        messageDiv.appendChild(contentDiv);
        messagesArea.appendChild(messageDiv);
    }

    let lastUserMessageContent = '';

    async function regenerateLastMessage() {
        const messages = getCurrentMessages();
        if (messages.length === 0) return;
        let lastUserIndex = -1;
        for (let i = messages.length-1; i >= 0; i--) {
            if (messages[i].role === 'user') {
                lastUserIndex = i;
                break;
            }
        }
        if (lastUserIndex === -1) return;
        const userMsg = messages[lastUserIndex].content;
        // 删除当前会话中该用户消息之后的所有 assistant 消息
        const session = sessions.find(s => s.id === currentSessionId);
        if (session) {
            session.messages = session.messages.slice(0, lastUserIndex+1);
            saveSessions();
        }
        renderMessages();
        await sendToAPI(userMsg);
    }

    async function sendMessage() {
        const userInput = messageInput.value.trim();
        if (!userInput) return;
        if (isWaiting) return;
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) {
            alert('请先输入 API Key');
            return;
        }
        isWaiting = true;
        sendBtn.disabled = true;
        messageInput.disabled = true;
        addMessageToCurrent('user', userInput);
        messageInput.value = '';
        await sendToAPI(userInput);
        isWaiting = false;
        sendBtn.disabled = false;
        messageInput.disabled = false;
        messageInput.focus();
    }

    async function sendToAPI(userMessage) {
        const apiKey = apiKeyInput.value.trim();
        const temperature = parseFloat(tempSlider.value);
        const model = isReasoningMode ? 'deepseek-reasoner' : 'deepseek-chat';
        const currentMessages = getCurrentMessages();
        // 构建历史（去掉 reasoning 字段）
        const apiMessages = currentMessages.map(m => ({ role: m.role, content: m.content }));
        const payload = {
            model: model,
            messages: apiMessages,
            temperature: temperature,
            max_tokens: 4096,
            stream: false
        };
        showTypingIndicator();
        try {
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify(payload)
            });
            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.error?.message || `请求失败 ${response.status}`);
            }
            const data = await response.json();
            const assistantMsg = data.choices[0].message;
            const content = assistantMsg.content;
            const reasoning = assistantMsg.reasoning_content || null;
            hideTypingIndicator();
            addMessageToCurrent('assistant', content, reasoning);
        } catch (error) {
            hideTypingIndicator();
            addMessageToCurrent('assistant', `❌ 错误：${error.message}`, null);
        }
    }

    function showTypingIndicator() {
        const indicator = document.createElement('div');
        indicator.className = 'message assistant';
        indicator.id = 'typingIndicator';
        indicator.innerHTML = `<div class="message-avatar">🤖</div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
        messagesArea.appendChild(indicator);
        scrollToBottom();
    }

    function hideTypingIndicator() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    function scrollToBottom() {
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    // 事件绑定
    newChatBtn.addEventListener('click', () => {
        newSession();
        if (window.innerWidth <= 700) sidebar.classList.remove('open');
    });
    menuToggle.addEventListener('click', () => {
        sidebar.classList.toggle('open');
    });
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    apiKeyInput.addEventListener('input', (e) => {
        const key = e.target.value.trim();
        if (key && key.startsWith('sk-')) localStorage.setItem('deepseek_api_key', key);
        else localStorage.removeItem('deepseek_api_key');
        updateApiStatus(key);
    });
    tempSlider.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        tempValue.textContent = val.toFixed(1);
        localStorage.setItem('deepseek_temperature', val);
    });
    thinkToggle.addEventListener('click', () => {
        isReasoningMode = !isReasoningMode;
        if (isReasoningMode) thinkToggle.classList.add('active');
        else thinkToggle.classList.remove('active');
        localStorage.setItem('deepseek_reasoning_mode', isReasoningMode);
    });

    // 初始化
    loadData();
    renderSessions();
    renderMessages();
    // 点击空白关闭侧边栏（手机）
    document.addEventListener('click', (e) => {
        if (window.innerWidth <= 700 && sidebar.classList.contains('open')) {
            if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        }
    });
</script>
</body>
</html>
